<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bankr Buddy</title>
<!-- Made by TachikomaRed x smolemaru -->
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
html, body {
  width:160px; height:160px;
  background:transparent;
  overflow:hidden;
  font-family:'Courier New', Courier, monospace;
}

/* ── Pet container ─────────────────────────────────── */
#pet {
  position:absolute;
  width:140px; height:140px;
  left:10px; top:10px;
  cursor:grab;
  transform-origin: center bottom;
}
#pet:active { cursor:grabbing; }

/* ── Speech bubble ─────────────────────────────────── */
#bubble {
  position:absolute;
  top:-2px; z-index:99; left:50%;
  transform:translateX(-50%);
  background:#7B5BF5;
  color:#fff;
  font-size:10px;
  line-height:1.3;
  padding:5px 9px;
  border-radius:8px;
  border:2px solid #1a1a1a;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s ease;
  z-index:50;
  max-width:180px;
}
#bubble.show { opacity:1; }
#bubble::after {
  content:'';
  position:absolute;
  bottom:-8px; left:50%;
  transform:translateX(-50%);
  border:4px solid transparent;
  border-top-color:#7B5BF5;
}

/* ── Floating emotion ──────────────────────────────── */
#emotion {
  position:absolute;
  top:2px; right:0px;
  font-size:15px;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  line-height:1;
}
#emotion.show { opacity:1; }

/* ── State animations ──────────────────────────────── */
@keyframes idle-bob        { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-4px)} }
@keyframes think-pulse     { 0%,100%{transform:scale(1)}         50%{transform:scale(1.05)} }
@keyframes work-shake      { 0%,100%{transform:translateX(0)}   33%{transform:translateX(-2px)} 66%{transform:translateX(2px)} }
@keyframes happy-bounce    { 0%,100%{transform:translateY(0) rotate(0deg)} 30%{transform:translateY(-10px) rotate(-4deg)} 70%{transform:translateY(-6px) rotate(4deg)} }
@keyframes error-wobble    { 0%,100%{transform:rotate(0deg)}    20%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} 80%{transform:rotate(-4deg)} }
@keyframes sleep-sway      { 0%,100%{transform:rotate(-3deg) translateY(2px)} 50%{transform:rotate(3deg) translateY(0)} }
@keyframes juggle-spin     { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.06)} 100%{transform:rotate(360deg) scale(1)} }
@keyframes conduct-wave    { 0%,100%{transform:translateX(0) scaleX(1)} 33%{transform:translateX(-3px) scaleX(0.96)} 66%{transform:translateX(3px) scaleX(1.04)} }
@keyframes notif-jump      { 0%,100%{transform:translateY(0)}   20%{transform:translateY(-11px)} 40%{transform:translateY(0)} 65%{transform:translateY(-6px)} 80%{transform:translateY(0)} }
@keyframes sweep-slide     { 0%,100%{transform:translateX(0)}   50%{transform:translateX(6px)} }
@keyframes carry-waddle    { 0%,100%{transform:rotate(0deg)}    25%{transform:rotate(-4deg) translateY(-2px)} 75%{transform:rotate(4deg) translateY(-2px)} }
@keyframes build-shake     { 0%,100%{transform:translateX(0)}   25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
@keyframes mini-breathe    { 0%,100%{transform:scaleY(1)}       50%{transform:scaleY(0.96)} }
@keyframes poke-react      { 0%{transform:scale(1) rotate(0)}   30%{transform:scale(0.85) rotate(-8deg)} 70%{transform:scale(1.07) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }

.anim-idle         { animation: idle-bob     2.5s ease-in-out infinite; }
.anim-thinking     { animation: think-pulse  1.0s ease-in-out infinite; }
.anim-working      { animation: work-shake   0.22s linear infinite; }
.anim-building     { animation: build-shake  0.16s linear infinite; }
.anim-happy        { animation: happy-bounce 0.6s  ease-in-out 4; }
.anim-error        { animation: error-wobble 0.38s ease-in-out infinite; }
.anim-sleeping     { animation: sleep-sway   3.2s  ease-in-out infinite; }
.anim-juggling     { animation: juggle-spin  1.1s  linear infinite; }
.anim-conducting   { animation: conduct-wave 0.75s ease-in-out infinite; }
.anim-notification { animation: notif-jump   0.5s  ease-in-out infinite; }
.anim-sweeping     { animation: sweep-slide  0.9s  ease-in-out infinite; }
.anim-carrying     { animation: carry-waddle 0.7s  ease-in-out infinite; }
.anim-mini         { animation: mini-breathe 3s    ease-in-out infinite; }
.anim-poke         { animation: poke-react   0.35s ease-in-out; }
</style>
</head>
<body>

<div id="bubble"></div>
<div id="emotion"></div>

<div id="pet" class="anim-idle">
  <svg id="canvas" width="140" height="140" viewBox="0 0 140 140"
       xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible;">

    <!-- ── TV outer body ──────────────────────────────────────── -->
    <rect x="3"  y="8"  width="134" height="118" rx="13"
          fill="#F5F0E8" stroke="#1a1a1a" stroke-width="3"/>

    <!-- ── Screen background (orange) ───────────────────────── -->
    <rect id="screen" x="10" y="16" width="92" height="86" rx="8"
          fill="#CC4B26"/>
    <!-- Screen bezel -->
    <rect x="10" y="16" width="92" height="86" rx="8"
          fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Glare highlight -->
    <rect x="13" y="19" width="28" height="5" rx="2.5"
          fill="rgba(255,255,255,0.13)"/>

    <!-- ── Face ────────────────────────────────────────────────
         All face elements are grouped so JS can transform them.
         Eyes: two pixel rectangles. Smile: 7 pixel blocks.       -->
    <g id="face">
      <!-- Left eye -->
      <rect id="el" x="24" y="38" width="12" height="16" fill="#F5D020"/>
      <!-- Right eye -->
      <rect id="er" x="56" y="38" width="12" height="16" fill="#F5D020"/>
      <!-- Smile row -->
      <g id="smile">
        <rect x="20" y="68" width="7" height="6" fill="#F5D020"/>
        <rect x="27" y="74" width="7" height="6" fill="#F5D020"/>
        <rect x="34" y="74" width="7" height="6" fill="#F5D020"/>
        <rect x="41" y="74" width="7" height="6" fill="#F5D020"/>
        <rect x="48" y="74" width="7" height="6" fill="#F5D020"/>
        <rect x="55" y="74" width="7" height="6" fill="#F5D020"/>
        <rect x="62" y="68" width="7" height="6" fill="#F5D020"/>
      </g>
    </g>

    <!-- ── Overlays (hidden by default) ──────────────────────── -->

    <!-- Thought bubble -->
    <g id="thought" style="opacity:0">
      <circle cx="83" cy="30" r="4.5" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="93" cy="21" r="7"   fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="105" cy="12" r="9"  fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="105" y="16" text-anchor="middle"
            font-family="'Courier New',monospace" font-size="8" fill="#7B5BF5">?</text>
    </g>

    <!-- ZZZ (sleeping) -->
    <g id="zzzs" style="opacity:0">
      <text x="84"  y="32" font-family="'Courier New',monospace" font-size="9"  font-weight="bold" fill="#7B5BF5">Z</text>
      <text x="94"  y="22" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#7B5BF5">Z</text>
      <text x="106" y="12" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#7B5BF5">Z</text>
    </g>

    <!-- Error X over eyes -->
    <g id="errx" style="opacity:0">
      <line x1="24" y1="38" x2="36" y2="54" stroke="#FF3B30" stroke-width="4" stroke-linecap="round"/>
      <line x1="36" y1="38" x2="24" y2="54" stroke="#FF3B30" stroke-width="4" stroke-linecap="round"/>
      <line x1="56" y1="38" x2="68" y2="54" stroke="#FF3B30" stroke-width="4" stroke-linecap="round"/>
      <line x1="68" y1="38" x2="56" y2="54" stroke="#FF3B30" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Happy stars -->
    <g id="stars" style="opacity:0">
      <text x="6"   y="22" font-size="11" font-family="sans-serif" fill="#F5D020">✦</text>
      <text x="126" y="18" font-size="9"  font-family="sans-serif" fill="#F5D020">✦</text>
      <text x="2"   y="65" font-size="7"  font-family="sans-serif" fill="#7B5BF5">✦</text>
    </g>

    <!-- Token orbit (juggling / conducting) -->
    <g id="orbit" style="opacity:0">
      <circle id="o1" cx="8"   cy="59" r="7.5" fill="#7B5BF5" stroke="#1a1a1a" stroke-width="1.5"/>
      <text   id="o1t" x="8"  y="63"  text-anchor="middle"
              font-family="'Courier New',monospace" font-size="7" font-weight="bold" fill="#fff">B</text>
      <circle id="o2" cx="132" cy="38" r="6"   fill="#F5D020" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle id="o3" cx="132" cy="82" r="5"   fill="#CC4B26" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>

    <!-- ── Right side panel ───────────────────────────────────── -->
    <rect x="106" y="16" width="28" height="86" rx="5"
          fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Hamburger / menu stripes -->
    <rect x="113" y="27" width="14" height="3"   fill="#1a1a1a"/>
    <rect x="113" y="33" width="14" height="3"   fill="#1a1a1a"/>
    <rect x="113" y="39" width="14" height="3"   fill="#1a1a1a"/>

    <!-- Slider tracks -->
    <rect x="116" y="50" width="3"  height="32" rx="1.5" fill="#1a1a1a"/>
    <rect x="123" y="50" width="3"  height="32" rx="1.5" fill="#1a1a1a"/>

    <!-- Slider knobs — purple, animated in JS -->
    <rect id="knob1" x="113" y="60" width="8"  height="5"  rx="1.5" fill="#7B5BF5"/>
    <rect id="knob2" x="120" y="72" width="8"  height="5"  rx="1.5" fill="#7B5BF5"/>

    <!-- ── Base / stand ───────────────────────────────────────── -->
    <rect x="28"  y="108" width="84" height="9"  rx="4"
          fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42"  y="117" width="56" height="8"  rx="3"
          fill="#E8E0D0" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- Power LED -->
    <rect id="led" x="14" y="111" width="12" height="4" rx="2" fill="#7B5BF5"/>

    <!-- Bankr label on base -->
    <text x="70" y="123" text-anchor="middle"
          font-family="'Courier New',monospace" font-size="5.5" font-weight="bold"
          fill="#7B5BF5">BANKR BUDDY</text>

  </svg>
</div>

<script>
// ── State config ──────────────────────────────────────────────────────────────
// eyes: 'n'=normal 'f'=focus 'h'=happy 'w'=wide 'sl'=sleep
// t=thought, z=zzz, err=error, st=stars, orb=orbit
const STATES = {
  idle:         { eyes:'n',  smile:1, bubble:'',              t:0,z:0,err:0,st:0,orb:0, led:'#7B5BF5' },
  thinking:     { eyes:'n',  smile:0, bubble:'thinking...',   t:1,z:0,err:0,st:0,orb:0, led:'#F5D020' },
  working:      { eyes:'f',  smile:0, bubble:'on it...',      t:0,z:0,err:0,st:0,orb:0, led:'#CC4B26' },
  building:     { eyes:'f',  smile:0, bubble:'building!',     t:0,z:0,err:0,st:0,orb:0, led:'#CC4B26' },
  happy:        { eyes:'h',  smile:1, bubble:'done! \u2713',  t:0,z:0,err:0,st:1,orb:0, led:'#34C759' },
  error:        { eyes:'n',  smile:0, bubble:'uh oh...',      t:0,z:0,err:1,st:0,orb:0, led:'#FF3B30' },
  sleeping:     { eyes:'sl', smile:0, bubble:'',              t:0,z:1,err:0,st:0,orb:0, led:'#444'    },
  juggling:     { eyes:'w',  smile:1, bubble:'routing!',      t:0,z:0,err:0,st:0,orb:1, led:'#7B5BF5' },
  conducting:   { eyes:'w',  smile:1, bubble:'multi-agent!',  t:0,z:0,err:0,st:0,orb:1, led:'#7B5BF5' },
  notification: { eyes:'w',  smile:0, bubble:'hey!',          t:0,z:0,err:0,st:0,orb:0, led:'#FF9500' },
  sweeping:     { eyes:'n',  smile:1, bubble:'compacting...',  t:0,z:0,err:0,st:0,orb:0, led:'#F5D020' },
  carrying:     { eyes:'f',  smile:1, bubble:'carrying...',   t:0,z:0,err:0,st:0,orb:0, led:'#CC4B26' },
};

// Eye pixel coords per variant
const EYES = {
  n:  { ly:38, lh:16, ry:38, rh:16 },
  f:  { ly:42, lh:10, ry:42, rh:10 },
  h:  { ly:44, lh:8,  ry:44, rh:8  },
  w:  { ly:34, lh:20, ry:34, rh:20 },
  sl: { ly:48, lh:3,  ry:48, rh:3  },
};

// Emotion icons per state
const EMOTIONS = {
  working:'⚡', building:'🔨', happy:'★', error:'✗', notification:'!',
};

// LED colours per state (matches STATES but kept separate for quick lookup)
const LEDS = {
  idle:'#7B5BF5', thinking:'#F5D020', working:'#CC4B26', building:'#CC4B26',
  happy:'#34C759', error:'#FF3B30', sleeping:'#444', juggling:'#7B5BF5',
  conducting:'#7B5BF5', notification:'#FF9500', sweeping:'#F5D020', carrying:'#CC4B26',
};

// ── DOM refs ──────────────────────────────────────────────────────────────────
const pet    = document.getElementById('pet');
const bubble = document.getElementById('bubble');
const emEl   = document.getElementById('emotion');
const el     = document.getElementById('el');
const er     = document.getElementById('er');
const smileG = document.getElementById('smile');
const led    = document.getElementById('led');
const knob1  = document.getElementById('knob1');
const knob2  = document.getElementById('knob2');
const thought= document.getElementById('thought');
const zzzs   = document.getElementById('zzzs');
const errx   = document.getElementById('errx');
const stars  = document.getElementById('stars');
const orbit  = document.getElementById('orbit');
const o1     = document.getElementById('o1');
const o1t    = document.getElementById('o1t');
const o2     = document.getElementById('o2');
const o3     = document.getElementById('o3');

let curState    = 'idle';
let isMini      = false;
let bubTimer    = null;
let clickCount  = 0;
let clickTimer  = null;
let dragging    = false;
let dragOffX    = 0, dragOffY = 0;
let downAt      = 0;
const DRAG_THRESHOLD = 6;

// ── Apply state ───────────────────────────────────────────────────────────────
function applyState(state) {
  const cfg = STATES[state] || STATES.idle;
  curState = state;

  // Animation class
  pet.className = 'anim-' + (isMini ? 'mini' : state);

  // Eyes
  const ev = EYES[cfg.eyes] || EYES.n;
  el.setAttribute('y', ev.ly); el.setAttribute('height', ev.lh);
  er.setAttribute('y', ev.ry); er.setAttribute('height', ev.rh);

  // Smile visibility
  smileG.style.opacity = cfg.smile ? '1' : '0';

  // Overlays
  thought.style.opacity = cfg.t   ? '1' : '0';
  zzzs.style.opacity    = cfg.z   ? '1' : '0';
  errx.style.opacity    = cfg.err ? '1' : '0';
  stars.style.opacity   = cfg.st  ? '1' : '0';
  orbit.style.opacity   = cfg.orb ? '1' : '0';

  // Power LED
  led.setAttribute('fill', LEDS[state] || '#7B5BF5');

  // Slider knob animation — jitter position slightly per state
  const k1y = { idle:60, thinking:58, working:55, error:65, sleeping:70, happy:58 }[state] || 60;
  const k2y = { idle:72, thinking:70, working:68, error:75, sleeping:76, happy:68 }[state] || 72;
  knob1.setAttribute('y', k1y);
  knob2.setAttribute('y', k2y);

  // Bubble
  cfg.bubble ? showBubble(cfg.bubble) : hideBubble();

  // Emotion flash
  const em = EMOTIONS[state];
  if (em) {
    emEl.textContent = em;
    emEl.classList.add('show');
    setTimeout(() => emEl.classList.remove('show'), 2000);
  }
}

// ── Bubble ────────────────────────────────────────────────────────────────────
function showBubble(text) {
  clearTimeout(bubTimer);
  bubble.textContent = text;
  bubble.classList.add('show');
  bubTimer = setTimeout(hideBubble, 3200);
}
function hideBubble() {
  bubble.classList.remove('show');
}

// ── Token orbit animation ─────────────────────────────────────────────────────
let orbitAngle = 0;
(function tickOrbit() {
  orbitAngle += 0.032;
  const cx = 56, cy = 59, r = 50;
  const x1 = cx + r * Math.cos(orbitAngle),       y1 = cy + r * Math.sin(orbitAngle);
  const x2 = cx + r * Math.cos(orbitAngle + 2.09), y2 = cy + r * Math.sin(orbitAngle + 2.09);
  const x3 = cx + r * Math.cos(orbitAngle + 4.18), y3 = cy + r * Math.sin(orbitAngle + 4.18);
  o1.setAttribute('cx', x1);  o1.setAttribute('cy', y1);
  o1t.setAttribute('x', x1); o1t.setAttribute('y', y1 + 3);
  o2.setAttribute('cx', x2);  o2.setAttribute('cy', y2);
  o3.setAttribute('cx', x3);  o3.setAttribute('cy', y3);
  requestAnimationFrame(tickOrbit);
}());

// ── Eye tracking (global mouse IPC) ───────────────────────────────────────────
window.buddy.onGlobalMouse((pos) => {
  if (curState !== 'idle' && curState !== 'thinking' && curState !== 'sleeping' && curState !== 'juggling') return;
  // Calculate relative to the window position on the screen
  const cx = window.screenX + 80; // 80 is center of 160px window
  const cy = window.screenY + 80;
  
  // Max movement allowed for eyes (increased to make it more obvious)
  const ox = Math.max(-10, Math.min(10, (pos.x - cx) / 80));
  const oy = Math.max(-8, Math.min(8, (pos.y - cy) / 80));
  
  const ev = EYES[STATES[curState]?.eyes || 'n'];
  el.setAttribute('x', 24 + ox); el.setAttribute('y', ev.ly + oy);
  er.setAttribute('x', 56 + ox); er.setAttribute('y', ev.ry + oy);
  
  // Smile tracking follows eyes slightly slower
  smileG.setAttribute('transform', `translate(${ox * 0.8}, ${oy * 0.8})`);
});

// ── Drag & Click ──────────────────────────────────────────────────────────────
let isDragMoved = false;
let startScreenX = 0, startScreenY = 0;

// (dblclick listener removed to avoid race conditions with registerPetTap)

function registerPetTap() {
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    if (clickCount >= 3) {
      window.buddy.forceState('juggling');
      showBubble('AHHH! 😵');
      setTimeout(() => window.buddy.forceState('idle'), 3000);
    } else if (clickCount >= 2) {
      pet.classList.add('anim-poke');
      setTimeout(() => {
        pet.classList.remove('anim-poke');
        pet.classList.add('anim-' + (isMini ? 'mini' : curState));
      }, 400);
      showBubble('Hey $BNKR buddy here!');
    }
    clickCount = 0;
  }, 400);
}

pet.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  dragging = true;
  isDragMoved = false;
  downAt = Date.now();
  startScreenX = e.screenX;
  startScreenY = e.screenY;
  dragOffX = e.screenX - window.screenX;
  dragOffY = e.screenY - window.screenY;
  window.buddy.enableMouse();
  e.preventDefault();
});


document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.screenX - startScreenX;
  const dy = e.screenY - startScreenY;
  if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
    isDragMoved = true;
  }
  if (isDragMoved) {
    window.moveTo(e.screenX - dragOffX, e.screenY - dragOffY);
  }
});

document.addEventListener('mouseup', (e) => {
  if (!dragging || e.button !== 0) return;
  const wasDragMoved = isDragMoved;
  dragging = false;
  window.buddy.dragEnd({ x: window.screenX, y: window.screenY });

  if (!pet.contains(e.target)) {
    window.buddy.disableMouse();
  }

  if (!wasDragMoved) {
    registerPetTap();
  }
});

// ── Mouse hover for click-through ─────────────────────────────────────────────
pet.addEventListener('mouseenter', () => { if (!dragging) window.buddy.enableMouse(); });
pet.addEventListener('mouseleave', () => { if (!dragging) window.buddy.disableMouse(); });

// ── Mini mode ─────────────────────────────────────────────────────────────────
function setMini(flag) {
  isMini = flag;
  if (flag) {
    pet.className = 'anim-mini';
  } else {
    pet.className = 'anim-' + curState;
    window.buddy.miniExit();
  }
}

// ── IPC from main process ─────────────────────────────────────────────────────
window.buddy.onStateChange(({ state, isMini: mini }) => {
  setMini(mini);
  applyState(state);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
applyState('idle');
showBubble('bankr buddy \uD83D\uDFE3');
</script>
</body>
</html>
