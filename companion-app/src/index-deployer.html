<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bankr Buddy — DEPLOYER</title>
<!-- Made by TachikomaRed x smolemaru -->
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
html, body { width:160px; height:160px; background:transparent; overflow:hidden; font-family:"Courier New",Courier,monospace; }

#pet {
  position:absolute;
  left:8px; top:0;
  width:144px; height:160px;
  cursor:grab;
  transform-origin:center bottom;
}
#pet:active { cursor:grabbing; }

/* Cap — tilts from its bottom-center (crown-to-head pivot) */
#cap {
  transform-box:fill-box;
  transform-origin:50% 100%;
}
/* Left arm — pivots from shoulder (right edge of arm shape) */
#arm-l {
  transform-box:fill-box;
  transform-origin:100% 50%;
}
/* Right arm — pivots from shoulder (left edge of arm shape) */
#arm-r {
  transform-box:fill-box;
  transform-origin:0% 50%;
}

/* ── Bubble ────────────────────── */
#bubble {
  position:absolute;
  top:-48px; left:50%;
  transform:translateX(-50%);
  background:#e53935;
  color:#fff;
  font-size:9px;
  font-weight:bold;
  line-height:1.35;
  padding:5px 9px;
  border-radius:7px;
  border:2px solid #fff;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  z-index:50;
  max-width:190px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
#bubble.show { opacity:1; }
#bubble::after {
  content:"";
  position:absolute;
  bottom:-8px; left:50%;
  transform:translateX(-50%);
  border:4px solid transparent;
  border-top-color:#e53935;
}

/* ── Emotion ───────────────────── */
#emotion {
  position:absolute;
  top:2px; right:2px;
  font-size:15px;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.12s;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.7));
}
#emotion.show { opacity:1; }

/* ── Overlays canvas ───────────── */
#overlay {
  position:absolute;
  left:0; top:0;
  width:144px; height:160px;
  pointer-events:none;
}

/* ── State animations ──────────── */
@keyframes idle-bob     { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-5px)} }
@keyframes think-pulse  { 0%,100%{transform:scale(1)}          50%{transform:scale(1.04)} }
@keyframes work-shake   { 0%,100%{transform:translateX(0)}    25%{transform:translateX(-2px)} 75%{transform:translateX(2px)} }
@keyframes happy-bounce { 0%,100%{transform:translateY(0) rotate(0)}   25%{transform:translateY(-11px) rotate(-4deg)} 75%{transform:translateY(-6px) rotate(4deg)} }
@keyframes error-wobble { 0%,100%{transform:rotate(0)}        20%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} 80%{transform:rotate(-4deg)} }
@keyframes sleep-sway   { 0%,100%{transform:rotate(-4deg) translateY(3px)} 50%{transform:rotate(4deg)} }
@keyframes juggle-spin  { 0%{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.06)} 100%{transform:rotate(360deg) scale(1)} }
@keyframes conduct-wave { 0%,100%{transform:translateX(0) scaleX(1)} 33%{transform:translateX(-4px) scaleX(0.95)} 66%{transform:translateX(4px) scaleX(1.05)} }
@keyframes notif-jump   { 0%,100%{transform:translateY(0)}    18%{transform:translateY(-13px)} 36%{transform:translateY(0)} 60%{transform:translateY(-7px)} 75%{transform:translateY(0)} }
@keyframes sweep-slide  { 0%,100%{transform:translateX(0)}    50%{transform:translateX(7px)} }
@keyframes carry-waddle { 0%,100%{transform:rotate(0)}        25%{transform:rotate(-5deg) translateY(-2px)} 75%{transform:rotate(5deg) translateY(-2px)} }
@keyframes build-shake  { 0%,100%{transform:translateX(0)}    25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
@keyframes poke-react   { 0%{transform:scale(1) rotate(0)}    30%{transform:scale(0.82) rotate(-9deg)} 70%{transform:scale(1.08) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
@keyframes cap-tip      { 0%,100%{transform:rotate(0)}        40%{transform:rotate(-18deg)} 70%{transform:rotate(6deg)} }
@keyframes cap-tilt     { 0%,100%{transform:rotate(0)}        50%{transform:rotate(-12deg)} }
@keyframes arm-pump-l   { 0%,100%{transform:rotate(0)}        50%{transform:rotate(-28deg)} }
@keyframes arm-pump-r   { 0%,100%{transform:rotate(0)}        50%{transform:rotate(28deg)} }

.anim-idle         { animation: idle-bob     2.4s ease-in-out infinite; }
.anim-thinking     { animation: think-pulse  1.0s ease-in-out infinite; }
.anim-working      { animation: work-shake   0.22s linear infinite; }
.anim-building     { animation: build-shake  0.17s linear infinite; }
.anim-happy        { animation: happy-bounce 0.65s ease-in-out 4; }
.anim-error        { animation: error-wobble 0.38s ease-in-out infinite; }
.anim-sleeping     { animation: sleep-sway   3.3s  ease-in-out infinite; }
.anim-juggling     { animation: juggle-spin  1.1s  linear infinite; }
.anim-conducting   { animation: conduct-wave 0.72s ease-in-out infinite; }
.anim-notification { animation: notif-jump   0.5s  ease-in-out infinite; }
.anim-sweeping     { animation: sweep-slide  0.88s ease-in-out infinite; }
.anim-carrying     { animation: carry-waddle 0.68s ease-in-out infinite; }
.anim-mini         { animation: idle-bob     3s    ease-in-out infinite; }
.anim-poke         { animation: poke-react   0.4s  ease-in-out; }

/* Cap animations per state */
.anim-happy      #cap { animation: cap-tip  0.65s ease-in-out 4; }
.anim-juggling   #cap { animation: cap-tilt 0.55s ease-in-out infinite; }
.anim-working    #cap { animation: cap-tilt 0.22s linear infinite; }
.anim-notification #cap { animation: cap-tip 0.5s ease-in-out infinite; }

/* Arm pump for working/building */
.anim-working  #arm-l { animation: arm-pump-l 0.22s linear infinite; }
.anim-working  #arm-r { animation: arm-pump-r 0.22s linear infinite; }
.anim-building #arm-l { animation: arm-pump-l 0.17s linear infinite; }
.anim-building #arm-r { animation: arm-pump-r 0.17s linear infinite; }
</style>
</head>

</svg>
<canvas id="overlay" width="144" height="160"></canvas>
</div>

<script>
'use strict';
// Made by TachikomaRed x smolemaru

const STATES = {
  idle:         { bubble:'',               overlay:'none'    },
  thinking:     { bubble:'computing...',   overlay:'thought' },
  working:      { bubble:'deploying...',   overlay:'none'    },
  building:     { bubble:'building!',      overlay:'none'    },
  happy:        { bubble:'SHIPPED! \u2713', overlay:'stars'  },
  error:        { bubble:'tx failed...',   overlay:'none'    },
  sleeping:     { bubble:'',               overlay:'zzz'     },
  juggling:     { bubble:'routing!',       overlay:'orbit'   },
  conducting:   { bubble:'multi-chain!',   overlay:'orbit'   },
  notification: { bubble:'new block!',     overlay:'none'    },
  sweeping:     { bubble:'compacting...',  overlay:'none'    },
  carrying:     { bubble:'carrying...',   overlay:'none'    },
};
const EMOTIONS = {
  working:'\u26a1', building:'\ud83d\udd28', happy:'\ud83c\udf89',
  error:'\ud83d\udc80', notification:'\ud83d\udce3', juggling:'\ud83e\udd84',
};

const pet    = document.getElementById('pet');
const bub    = document.getElementById('bubble');
const emEl   = document.getElementById('emotion');
const oCtx   = document.getElementById('overlay').getContext('2d');

let curState='idle', isMini=false, bubTimer=null;
let clickCount=0, clickTimer=null, dragging=false, dragOffX=0, dragOffY=0;
let orbitAngle=0, rafId=null;

// Overlay render loop
(function tick(){
  oCtx.clearRect(0,0,144,160);
  const ov = (STATES[curState]||STATES.idle).overlay;

  if (ov==='zzz'){
    oCtx.fillStyle='#7B5BF5';
    oCtx.font='bold 10px "Courier New"'; oCtx.fillText('Z',110,32);
    oCtx.font='bold 13px "Courier New"'; oCtx.fillText('Z',119,20);
    oCtx.font='bold 17px "Courier New"'; oCtx.fillText('Z',128,8);
  }
  else if (ov==='thought'){
    oCtx.fillStyle='#fff'; oCtx.strokeStyle='#333'; oCtx.lineWidth=1.5;
    [[118,32,4],[125,22,6],[131,11,8]].forEach(([cx,cy,r])=>{
      oCtx.beginPath(); oCtx.arc(cx,cy,r,0,Math.PI*2); oCtx.fill(); oCtx.stroke();
    });
    oCtx.fillStyle='#e53935'; oCtx.font='bold 7px "Courier New"';
    oCtx.textAlign='center'; oCtx.fillText('?',131,15); oCtx.textAlign='left';
  }
  else if (ov==='stars'){
    oCtx.font='13px sans-serif'; oCtx.fillText('\u2726',3,22);
    oCtx.font='10px sans-serif'; oCtx.fillText('\u2726',126,18);
    oCtx.font='7px sans-serif';  oCtx.fillText('\u2726',1,62);
  }
  else if (ov==='orbit'){
    orbitAngle+=0.03;
    const cx=72,cy=80,r=58;
    [[0,'#7B5BF5','B'],[2.09,'#fcfc00',''],[4.18,'#34C759','']].forEach(([a,c,t],i)=>{
      const x=cx+r*Math.cos(orbitAngle+a), y=cy+r*Math.sin(orbitAngle+a), r2=[8,6.5,5.5][i];
      oCtx.beginPath(); oCtx.arc(x,y,r2,0,Math.PI*2);
      oCtx.fillStyle=c; oCtx.fill(); oCtx.strokeStyle='#000'; oCtx.lineWidth=1.5; oCtx.stroke();
      if(t){ oCtx.fillStyle='#fff'; oCtx.font='bold 7px "Courier New"'; oCtx.textAlign='center'; oCtx.fillText(t,x,y+3); oCtx.textAlign='left'; }
    });
  }
  rafId=requestAnimationFrame(tick);
})();

function applyState(s){
  const cfg=STATES[s]||STATES.idle;
  curState=s;
  pet.className='anim-'+(isMini?'mini':s);
  if(cfg.bubble) showBubble(cfg.bubble);
  else if(s!=='idle') hideBubble();
  const em=EMOTIONS[s];
  if(em){ emEl.textContent=em; emEl.classList.add('show'); setTimeout(()=>emEl.classList.remove('show'),2200); }
}

function showBubble(t){ clearTimeout(bubTimer); bub.textContent=t; bub.classList.add('show'); bubTimer=setTimeout(hideBubble,3200); }
function hideBubble(){ bub.classList.remove('show'); }

pet.addEventListener('mousedown',(e)=>{ if(e.button!==0)return; dragging=true; dragOffX=e.screenX-window.screenX; dragOffY=e.screenY-window.screenY; window.buddy.enableMouse(); e.preventDefault(); });
document.addEventListener('mousemove',(e)=>{ if(!dragging)return; window.moveTo(e.screenX-dragOffX,e.screenY-dragOffY); });
document.addEventListener('mouseup',(e)=>{ if(!dragging||e.button!==0)return; dragging=false; window.buddy.dragEnd({x:window.screenX,y:window.screenY}); });

pet.addEventListener('click',()=>{
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer=setTimeout(()=>{
    if(clickCount>=3){ 
        window.buddy.forceState('juggling'); 
        showBubble('SEND IT \ud83d\ude80\ud83d\udd25'); 
        setTimeout(()=>window.buddy.forceState('idle'),3000); 
    }
    else if(clickCount===2){ 
        pet.classList.add('anim-poke'); 
        setTimeout(()=>pet.classList.remove('anim-poke'),420); 
        window.buddy.forceState('idle'); 
        setTimeout(()=>showBubble('DEPLOYER ONLINE \ud83c\udfd7\ufe0f'),60); 
    }
    clickCount=0;
  },350);
});

pet.addEventListener('mouseenter',()=>{ if(!dragging) window.buddy.enableMouse(); });
pet.addEventListener('mouseleave',()=>{ if(!dragging) window.buddy.disableMouse(); });

function setMini(f){ isMini=f; pet.className='anim-'+(f?'mini':curState); if(!f) window.buddy.miniExit(); }

window.buddy.onStateChange(({state,isMini:mini})=>{ setMini(mini); applyState(state); });
// if (window.buddy.onShowBubble) window.buddy.onShowBubble((t)=>showBubble(t));
window.buddy.onShowBubble((t) => { console.log('BUBBLE:', t); showBubble(t); });

const audioEl=new Audio(); audioEl.preload='auto';
if(window.buddy.onPlaySound) window.buddy.onPlaySound(({path,volume})=>{ audioEl.src='file://'+path; audioEl.volume=Math.max(0,Math.min(1,volume??0.6)); audioEl.currentTime=0; audioEl.play().catch(()=>{}); });

// Sound panel (triple-click)
let sOpen=false,sEl=null;
async function openSettings(){
  if(sOpen&&sEl){sEl.remove();sOpen=false;window.buddy.disableMouse();return;} 
  sOpen=true;
  window.buddy.enableMouse();
  const cfg=await window.buddy.soundGetConfig(); const packs=await window.buddy.soundListPacks();
  sEl=document.createElement('div');
  sEl.style.cssText='position:fixed;top:4px;left:50%;transform:translateX(-50%);background:#1a0000;border:2px solid #e53935;border-radius:6px;padding:7px 9px;color:#fff;font-family:"Courier New",monospace;font-size:9px;z-index:200;min-width:144px;line-height:1.7;';
  sEl.innerHTML=`<div style="color:#e53935;font-weight:bold;margin-bottom:3px;">\ud83e\udde2 HAM SOUNDS</div><select id="sp-p" style="width:100%;background:#330000;color:#fff;border:1px solid #e53935;font-size:9px;">${packs.slice(0,80).map(p=>`<option value="${p.name}"${p.name===cfg.pack?' selected':''}>${p.displayName}</option>`).join('')}</select><label style="display:block;margin-top:4px;">Vol:<span id="sp-v">${Math.round(cfg.volume*100)}%</span><input id="sp-r" type="range" min="0" max="100" value="${Math.round(cfg.volume*100)}" style="width:100%;"></label><label style="display:block;margin-top:2px;"><input id="sp-e" type="checkbox"${cfg.enabled?' checked':''}> on</label><div style="display:flex;gap:4px;margin-top:5px;"><button id="sp-t" style="flex:1;background:#e53935;border:none;color:#fff;padding:2px;font-size:9px;cursor:pointer;font-family:'Courier New',monospace;">\u25b6 test</button><button id="sp-c" style="flex:1;background:#333;border:1px solid #666;color:#fff;padding:2px;font-size:9px;cursor:pointer;font-family:'Courier New',monospace;">\u2715</button></div>`;
  document.body.appendChild(sEl);
  sEl.querySelector('#sp-p').onchange=async(e)=>{showBubble('loading...');await window.buddy.soundLoadPack(e.target.value).catch(()=>{});showBubble('loaded!');};
  sEl.querySelector('#sp-r').oninput=(e)=>{sEl.querySelector('#sp-v').textContent=e.target.value+'%';window.buddy.soundSetVolume(e.target.value/100);};
  sEl.querySelector('#sp-e').onchange=(e)=>window.buddy.soundSetEnabled(e.target.checked);
  sEl.querySelector('#sp-t').onclick=()=>window.buddy.soundTest('task.complete');
  sEl.querySelector('#sp-c').onclick=()=>{sEl.remove();sOpen=false;window.buddy.disableMouse();};
}
let tc=0,tt=null;
pet.addEventListener('click',()=>{tc++;clearTimeout(tt);tt=setTimeout(()=>{if(tc===3)openSettings();tc=0;},400);});
if (window.buddy.showSoundPanel) window.buddy.showSoundPanel(() => openSettings());

setTimeout(() => showBubble('DEPLOYER ONLINE 🏗️'), 500);
applyState('idle');
</script>
</body>
