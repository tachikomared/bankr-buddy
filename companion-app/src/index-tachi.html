<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>$TACHI Crab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:160px;height:160px;background:transparent;overflow:hidden;font-family:'Courier New',monospace}
#pet{position:absolute;left:0;top:0;width:160px;height:160px;cursor:grab;transform-origin:center center;z-index:10}
#bubble{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);z-index:99;background:#2a0000;color:#ff4d4d;font-size:9px;font-weight:bold;padding:3px 6px;border:1px solid #ff4d4d;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;max-width:150px;overflow:hidden;text-overflow:ellipsis}
#bubble.show{opacity:1}
canvas{display:block;width:160px;height:160px}
</style>
</head>
<body>
<div id="pet">
  <div id="bubble"></div>
  <canvas id="c" width="320" height="320"></canvas>
</div>
<script>
const DPR=2,W=160,H=160;
const c=document.getElementById('c'),x=c.getContext('2d');
c.width=W*DPR;c.height=H*DPR;x.scale(DPR,DPR);
const b=document.getElementById('bubble');
let msg='';
function showBubble(t){msg=t||'';b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2400)}
function render(){x.clearRect(0,0,W,H);x.fillStyle='#ff4d4d';x.font='bold 34px "Courier New"';x.fillText('🦀',62,92);x.fillStyle='#fff';x.font='bold 8px "Courier New"';x.fillText('$TACHI',44,120);requestAnimationFrame(render)}
if(window.buddy){window.buddy.onShowBubble(t=>showBubble(t))}
render();
</script>
</body>
</html>
