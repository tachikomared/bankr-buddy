<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bankr Buddy — TACHI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:340px;height:320px;background:transparent;overflow:visible;font-family:'Courier New',monospace}
#pet{position:absolute;left:0;top:5px;width:340px;height:310px;cursor:grab;transform-origin:center center;pointer-events:auto;z-index:10}
#pet:active{cursor:grabbing}
canvas{display:block;width:340px;height:310px}
@keyframes idle-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes think-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes work-shake{0%,100%{transform:translateX(0)}33%{transform:translateX(-2px)}66%{transform:translateX(2px)}}
@keyframes happy-bounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-8px) rotate(-2deg)}70%{transform:translateY(-4px) rotate(2deg)}}
@keyframes error-wobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}80%{transform:rotate(-2deg)}}
@keyframes sleep-sway{0%,100%{transform:rotate(-1.5deg) translateY(2px)}50%{transform:rotate(1.5deg)}}
@keyframes juggle-spin{0%{transform:rotate(0) scale(.82)}50%{transform:rotate(180deg) scale(.78)}100%{transform:rotate(360deg) scale(.82)}}
@keyframes notif-jump{0%,100%{transform:translateY(0)}20%{transform:translateY(-10px)}40%{transform:translateY(0)}65%{transform:translateY(-5px)}}
@keyframes poke-react{0%{transform:scale(1) rotate(0)}30%{transform:scale(.88) rotate(-6deg)}70%{transform:scale(1.06) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
@keyframes mini-breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.96)}}
.anim-idle{animation:idle-bob 2.5s ease-in-out infinite}
.anim-thinking{animation:think-pulse 1s ease-in-out infinite}
.anim-working,.anim-building,.anim-conducting,.anim-sweeping,.anim-carrying{animation:work-shake .22s linear infinite}
.anim-happy{animation:happy-bounce .6s ease-in-out 4}
.anim-error{animation:error-wobble .38s ease-in-out infinite}
.anim-sleeping{animation:sleep-sway 3.2s ease-in-out infinite}
.anim-juggling{animation:juggle-spin 1.1s linear infinite}
.anim-notification{animation:notif-jump .5s ease-in-out infinite}
.anim-mini{animation:mini-breathe 3s ease-in-out infinite}
.anim-poke{animation:poke-react .35s ease-in-out}
</style>
</head>

  var d=oc.getImageData(0,0,W,H).data;var pts=[];var gap=8;
  for(var py=0;py<H;py+=gap){for(var px=0;px<W;px+=gap){
    var i=(py*W+px)*4;var r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
    if(a>28){var gn=g>r*1.2&&g>b*1.2&&g>70;var dk=(r+g+b)/3<35;var br=(r+g+b)/3>200;
    var t=1;if(gn)t=5;else if(dk)t=4;else if(br)t=8;
    pts.push({x:px,y:py,t:t,gn:gn});}
  }}return pts;
}
function buildBody(pts){
  gl=[];for(var i=0;i<pts.length;i++){var p=pts[i];
  var ch,pl;if(p.t===5){ch=rc(EN);pl=EN;}else if(p.t===4){ch=rc(ME);pl=ME;}else if(p.t===8){ch=rc(CR);pl=CR;}else{ch=rc(KA);pl=KA;}
  gl.push({ch:ch,pl:pl,t:p.t,gn:p.gn,hx:p.x,hy:p.y,x:p.x+(Math.random()-.5)*W*2.5,y:-Math.random()*H*2.5,vx:0,vy:0,rot:(Math.random()-.5)*4,vr:0,ht:1,a:0,ct:Math.random()*80});}
}
function buildEyes(ek){
  var ecx=W*FX,ecy=H*FY;var ed=EYES[ek]||EYES.normal;eyeGl=[];
  var lx=ecx-EG*.5,rx=ecx+EG*.5;
  for(var ey=-ed.h;ey<=ed.h;ey++){for(var ex=-ed.w;ex<=ed.w;ex++){
    eyeGl.push({hx:lx+ex*3.5,hy:ecy+ey*3,x:lx+ex*3.5,y:ecy+ey*3,vx:0,vy:0,ht:.1,a:.9,ch:rc(GC),ct:0,isShine:false,xf:ed.xf});}}
  eyeGl.push({hx:lx-2,hy:ecy-ed.h*2.5,x:lx-2,y:ecy-ed.h*2.5,vx:0,vy:0,ht:.05,a:1,ch:'◎',ct:0,isShine:true});
  eyeGl.push({hx:lx,hy:ecy-ed.h*2.5+3,x:lx,y:ecy-ed.h*2.5+3,vx:0,vy:0,ht:.05,a:.8,ch:'◇',ct:0,isShine:true});
  for(var ey=-ed.h;ey<=ed.h;ey++){for(var ex=-ed.w;ex<=ed.w;ex++){
    eyeGl.push({hx:rx+ex*3.5,hy:ecy+ey*3,x:rx+ex*3.5,y:ecy+ey*3,vx:0,vy:0,ht:.1,a:.9,ch:rc(GC),ct:0,isShine:false,xf:ed.xf});}}
  eyeGl.push({hx:rx-2,hy:ecy-ed.h*2.5,x:rx-2,y:ecy-ed.h*2.5,vx:0,vy:0,ht:.05,a:1,ch:'◎',ct:0,isShine:true});
  eyeGl.push({hx:rx,hy:ecy-ed.h*2.5+3,x:rx,y:ecy-ed.h*2.5+3,vx:0,vy:0,ht:.05,a:.8,ch:'◇',ct:0,isShine:true});
}
function buildMouth(){
  var mcx=W*(FX+.02),mcy=H*(FY+MYO);mouthGl=[];
  var pts=[{dx:-8,dy:0},{dx:-5,dy:1.5},{dx:-2,dy:2},{dx:1,dy:2},{dx:4,dy:1.5},{dx:7,dy:0},{dx:10,dy:-1.5},{dx:-5,dy:3.5},{dx:-1,dy:4},{dx:3,dy:3.5}];
  for(var i=0;i<pts.length;i++){var m=pts[i];mouthGl.push({hx:mcx+m.dx*1.2,hy:mcy+m.dy*1.4,x:mcx+m.dx*1.2,y:mcy+m.dy*1.4,vx:0,vy:0,ht:.1,a:.95,ch:rc('█▓'),ct:0});}
}
function buildCig(){
  var mcx=W*(FX+.02),mcy=H*(FY+MYO);cigGl=[];
  for(var i=0;i<5;i++){cigGl.push({hx:mcx+12+i*3,hy:mcy-1-i*.3,x:mcx+12+i*3,y:mcy-1-i*.3,vx:0,vy:0,ch:i<3?'█':i===3?'▓':'◆',color:i<3?'#e8dcc8':i===3?'#cc8844':'#ff4400',a:.9,ht:0});}
}
// Rain
var rn=[];for(var i=0;i<18;i++){var d={x:(i/18)*W+Math.random()*(W/18),y:Math.random()*H,sp:.3+Math.random()*2,ch:[],ln:3+((Math.random()*8)|0),t:0};for(var j=0;j<d.ln;j++)d.ch.push(rc(KA));rn.push(d);}
// Vertical matrix streams
var SW=['TACHI','AGENT','ROUTE','BUILD','GUARD','DEPLOY','BASE','SIGNAL','SWARM','COMPILE'];
var vStr=[];for(var i=0;i<10;i++){var word=rc(SW);var chars=[];var pre=2+Math.floor(Math.random()*4);var post=2+Math.floor(Math.random()*4);for(var j=0;j<pre;j++)chars.push({ch:rc(KA),w:false});for(var j=0;j<word.length;j++)chars.push({ch:word[j],w:true});for(var j=0;j<post;j++)chars.push({ch:rc(KA),w:false});vStr.push({x:6+Math.random()*(W-12),y:-chars.length*7-Math.random()*H,chars:chars,sp:.3+Math.random()*1.2,al:.1+Math.random()*.15});}
// Speech
var spG=[],spQ=[],spT=0;
function speak(text){if(!text)return;spQ=[];spT=0;spG.length=0;var chars=text.toUpperCase().split('');for(var i=0;i<chars.length;i++){var ang=-Math.PI*.8+i/((chars.length-1)||1)*Math.PI*.6;var rad=30+chars.length*1.5;spQ.push({ch:chars[i],delay:i*3,born:false,tx:W*FX+Math.cos(ang)*rad,ty:H*FY+Math.sin(ang)*rad-12});}}
function tickSpeech(){spT++;for(var qi=0;qi<spQ.length;qi++){var q=spQ[qi];if(!q.born&&spT>=q.delay){q.born=true;var mcx=W*(FX+.02),mcy=H*(FY+MYO);spG.push({ch:rc(KA),tgt:q.ch,x:mcx+(Math.random()-.5)*10,y:mcy+(Math.random()-.5)*5,tx:q.tx,ty:q.ty,vx:0,vy:0,age:0,max:150,morph:14,hold:40,scat:110,sz:3});}}for(var i=spG.length-1;i>=0;i--){var s=spG[i];s.age++;if(s.age<s.morph){s.x+=(s.tx-s.x)*.07;s.y+=(s.ty-s.y)*.07;if(s.age%2===0)s.ch=rc(KA);s.sz=3+s.age/s.morph*4;}else if(s.age===s.morph)s.ch=s.tgt;else if(s.age<s.hold){s.x+=(s.tx-s.x)*.14;s.y+=(s.ty-s.y)*.14;s.sz=7;}else if(s.age<s.scat){s.x+=(s.tx-s.x)*.03;s.x+=Math.sin(gt*.025+i)*.1;s.sz=7;}else{if(s.age===s.scat){s.vx=(Math.random()-.5)*2;s.vy=-Math.random()*1.2-.3;}s.x+=s.vx;s.y+=s.vy;s.vy+=.007;if(s.age%3===0)s.ch=rc(KA);s.sz=Math.max(2,7-(s.age-s.scat)*.04);}if(s.age>s.max)spG.splice(i,1);}}
function bst(f){for(var i=0;i<gl.length;i++){var g=gl[i];var dx=g.x-W*FX,dy=g.y-H*FY,d=Math.max(1,Math.sqrt(dx*dx+dy*dy));g.vx+=(dx/d)*f*(.4+Math.random());g.vy+=(dy/d)*f*(.4+Math.random());g.vr+=(Math.random()-.5)*f*.1;g.ht=1;}}
function apply(s){var c=ST[s]||ST.idle;cur=s;cf=c;var pet=document.getElementById('pet');pet.className='anim-'+(isMini?'mini':s);buildEyes(c.eye);buildMouth();buildCig();speak(c.msg);if(s==='error')bst(c.ch*9);if(s==='juggling'||s==='notification')bst(c.ch*7);}
function tick(){
  gt++;lC+=(cf.ch-lC)*.04;lR+=(cf.r-lR)*.04;lP+=(cf.p-lP)*.05;lStr+=(cf.str-lStr)*.03;
  var edx=Math.max(-5,Math.min(5,(mx-W*FX)/14)),edy=Math.max(-4,Math.min(4,(my-H*FY)/14));
  for(var i=0;i<gl.length;i++){var g=gl[i];g.vx+=(g.hx-g.x)*.043;g.vy+=(g.hy-g.y)*.043;if(lC>0){g.vx+=(Math.random()-.5)*lC*2;g.vy+=(Math.random()-.5)*lC*2;g.vr+=(Math.random()-.5)*lC*.05;}g.vx*=.87;g.vy*=.87;g.vr*=.9;g.x+=g.vx;g.y+=g.vy;g.rot+=g.vr;g.rot*=.95;g.ht*=.955;g.a+=(1-g.a)*.04;g.ct--;if(g.ct<=0&&(g.t===1||g.t===8)){g.ch=rc(g.pl);g.ct=(g.ht>.3?2:16)+Math.random()*8;}if(cur==='sleeping')g.x+=Math.sin(gt*.005+g.hx*.01)*.03;}
  for(var i=0;i<eyeGl.length;i++){var g=eyeGl[i];var tx=g.isShine?g.hx+edx*2:g.hx+edx*.4,ty=g.isShine?g.hy+edy*1.6:g.hy+edy*.4;g.vx+=(tx-g.x)*.1;g.vy+=(ty-g.y)*.1;g.vx*=.8;g.vy*=.8;g.x+=g.vx;g.y+=g.vy;g.a+=(1-g.a)*.07;g.ct--;if(g.ct<=0&&!g.isShine){g.ch=rc(GC);g.ct=25+Math.random()*15;}}
  for(var i=0;i<mouthGl.length;i++){var g=mouthGl[i];g.vx+=(g.hx+edx*.5-g.x)*.1;g.vy+=(g.hy+edy*.4-g.y)*.1;g.vx*=.8;g.vy*=.8;g.x+=g.vx;g.y+=g.vy;g.a+=(1-g.a)*.08;g.ct--;if(g.ct<=0){g.ch=rc('█▓');g.ct=18+Math.random()*10;}}
  for(var i=0;i<cigGl.length;i++){var g=cigGl[i];g.vx+=(g.hx+edx*.6-g.x)*.1;g.vy+=(g.hy+edy*.4-g.y)*.1;g.vx*=.8;g.vy*=.8;g.x+=g.vx;g.y+=g.vy;g.a+=(1-g.a)*.08;}
  if(gt%5===0&&cur!=='sleeping'){var tip=cigGl.length>0?cigGl[cigGl.length-1]:{x:W*.55,y:H*.35};smokeP.push({x:tip.x+Math.random()*2,y:tip.y-1,vx:.15+edx*.04+(Math.random()-.5)*.2,vy:-.2-Math.random()*.3,life:30+Math.random()*20,age:0,ch:rc('░▒◦·'),sz:2+Math.random()*1.5});}
  for(var i=smokeP.length-1;i>=0;i--){var s=smokeP[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.98;s.vy-=.004;s.age++;if(s.age>s.life)smokeP.splice(i,1);}
  for(var i=0;i<rn.length;i++){var d=rn[i];d.y+=d.sp*lR*1.4;d.t++;if(d.t%4===0)d.ch[0]=rc(KA);if(d.y>H+d.ln*7){d.y=-d.ln*7;d.x=Math.random()*W;d.sp=.3+Math.random()*2;}}
  if(lStr>.02){for(var i=0;i<vStr.length;i++){var s=vStr[i];s.y+=s.sp*lStr;if(gt%8===0)for(var j=0;j<s.chars.length;j++)if(!s.chars[j].w&&Math.random()>.5)s.chars[j].ch=rc(KA);if(s.y>H+10){s.y=-s.chars.length*7-Math.random()*60;s.x=6+Math.random()*(W-12);var word=rc(SW);s.chars=[];var pre=2+Math.floor(Math.random()*4);for(var j=0;j<pre;j++)s.chars.push({ch:rc(KA),w:false});for(var j=0;j<word.length;j++)s.chars.push({ch:word[j],w:true});var post=2+Math.floor(Math.random()*4);for(var j=0;j<post;j++)s.chars.push({ch:rc(KA),w:false});}}}
  tickSpeech();render();requestAnimationFrame(tick);
}
function render(){
  ctx.clearRect(0,0,W,H);var sc=cf.c,ec=cf.e;
  if(lStr>.02){ctx.textBaseline='top';ctx.textAlign='center';for(var i=0;i<vStr.length;i++){var s=vStr[i];for(var ci=0;ci<s.chars.length;ci++){var cy=s.y+ci*7;if(cy<-7||cy>H)continue;var c=s.chars[ci];var isHead=ci===s.chars.length-1;ctx.globalAlpha=isHead?s.al*lStr*2.5:s.al*lStr*(c.w?1.5:1);ctx.fillStyle=isHead?'#ffffff':c.w?ec:'#00882a';ctx.font=c.w?'bold 6px "Courier New"':'5px "Courier New"';ctx.fillText(c.ch,s.x,cy);}}}
  if(lR>.02){ctx.font='5px "Courier New"';ctx.textBaseline='top';ctx.textAlign='left';for(var i=0;i<rn.length;i++){var d=rn[i];for(var j=0;j<d.ch.length;j++){var cy=d.y-j*7;if(cy<-7||cy>H)continue;ctx.globalAlpha=(j===0?1:Math.max(.03,1-j/d.ln))*lR*.1;ctx.fillStyle=j===0?'#fff':ec;ctx.fillText(d.ch[j],d.x,cy);}}}
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.font='bold 5px "Courier New"';
  for(var i=0;i<gl.length;i++){var g=gl[i];if(g.a<.02)continue;var color=sc;if(g.t===5||g.gn)color=ec;else if(g.t===4)color='#444';else if(g.t===8)color='hsl('+(gt*2+g.hx*.5)%360+',70%,55%)';var alpha=Math.min(1,g.a+g.ht*.4);if(lP>0)alpha=Math.min(1,alpha+Math.sin(gt*.06+g.hx*.015+g.hy*.015)*lP*.07);ctx.globalAlpha=alpha;ctx.fillStyle=color;if(Math.abs(g.rot)<.015){ctx.fillText(g.ch,g.x,g.y);}else{ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.fillText(g.ch,0,0);ctx.restore();}}
  for(var i=0;i<eyeGl.length;i++){var g=eyeGl[i];if(g.a<.02)continue;ctx.globalAlpha=Math.min(1,g.a);if(g.isShine){ctx.fillStyle='#ffffff';ctx.font='bold 4px "Courier New"';}else if(g.xf&&gt%8<4){ctx.fillStyle='#ff3300';ctx.font='bold 4px "Courier New"';}else{ctx.fillStyle='#ffffff';ctx.font='bold 4px "Courier New"';}ctx.fillText(g.ch,g.x,g.y);}
  ctx.font='bold 4px "Courier New"';for(var i=0;i<mouthGl.length;i++){var g=mouthGl[i];if(g.a<.02)continue;ctx.globalAlpha=g.a*.9;ctx.fillStyle='#e8e4de';ctx.fillText(g.ch,g.x,g.y);}
  ctx.font='bold 3px "Courier New"';for(var i=0;i<cigGl.length;i++){var g=cigGl[i];ctx.globalAlpha=g.a*.9;ctx.fillStyle=g.color;ctx.fillText(g.ch,g.x,g.y);}
  for(var i=0;i<smokeP.length;i++){var s=smokeP[i];ctx.globalAlpha=Math.max(0,(1-s.age/s.life)*.3);ctx.fillStyle='#aaa';ctx.font=(s.sz+s.age/s.life*2)+'px "Courier New"';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(s.ch,s.x,s.y);}
  for(var i=0;i<spG.length;i++){var s=spG[i];var lr=s.age/s.max;var alpha=lr<.08?lr/.08:lr>.78?1-(lr-.78)/.22:1;ctx.globalAlpha=alpha*.85;ctx.fillStyle=s.age<s.morph?'#ff1a1a':s.age<s.scat?'#ff4444':'#661111';ctx.font='bold '+s.sz+'px "Courier New"';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText(s.ch,s.x,s.y);}
  if(cur==='sleeping'){ctx.globalAlpha=.4+Math.sin(gt*.03)*.25;ctx.fillStyle='#1a4422';ctx.textBaseline='middle';ctx.textAlign='center';var zo=Math.sin(gt*.02)*3;ctx.font='bold 8px "Courier New"';ctx.fillText('Z',W*.7,H*.12+zo);ctx.font='bold 11px "Courier New"';ctx.fillText('Z',W*.77,H*.06+zo*.7);ctx.font='bold 14px "Courier New"';ctx.fillText('Z',W*.85,H*.01+zo*.4);}
  ctx.globalAlpha=.012;ctx.fillStyle='#000';for(var sy=0;sy<H;sy+=4)ctx.fillRect(0,sy,W,1);ctx.globalAlpha=1;
}
// IPC + Drag
var pet=document.getElementById('pet');
var clickCount=0,clickTimer=null,dragging=false,dragOffX=0,dragOffY=0,isDragMoved=false,startSX=0,startSY=0;
function registerPetTap(){clickCount++;clearTimeout(clickTimer);clickTimer=setTimeout(function(){if(clickCount>=3){if(window.buddy)window.buddy.forceState('juggling');speak('AHHH');bst(10);setTimeout(function(){if(window.buddy)window.buddy.forceState('idle');},3000);}else if(clickCount>=1){if(cur==='happy'||cur==='sleeping'){if(window.buddy)window.buddy.forceState('idle');}else{pet.classList.add('anim-poke');bst(3);setTimeout(function(){pet.classList.remove('anim-poke');pet.classList.add('anim-'+(isMini?'mini':cur));},400);speak('TACHI buddy');if(window.buddy)window.buddy.soundTest('session.start');}}clickCount=0;},400);}
pet.addEventListener('mousedown',function(e){if(e.button!==0)return;dragging=true;isDragMoved=false;startSX=e.screenX;startSY=e.screenY;dragOffX=e.screenX-window.screenX;dragOffY=e.screenY-window.screenY;if(window.buddy)window.buddy.enableMouse();});
document.addEventListener('mousemove',function(e){if(!dragging)return;if(Math.abs(e.screenX-startSX)>6||Math.abs(e.screenY-startSY)>6)isDragMoved=true;if(isDragMoved)window.moveTo(e.screenX-dragOffX,e.screenY-dragOffY);});
document.addEventListener('mouseup',function(e){if(!dragging||e.button!==0)return;var wd=isDragMoved;dragging=false;if(window.buddy)window.buddy.dragEnd({x:window.screenX,y:window.screenY});if(!pet.contains(e.target)&&window.buddy)window.buddy.disableMouse();if(!wd)registerPetTap();});
pet.addEventListener('mouseenter',function(){if(!dragging&&window.buddy)window.buddy.enableMouse();});
pet.addEventListener('mouseleave',function(){if(!dragging&&window.buddy)window.buddy.disableMouse();});
function setMini(f){isMini=f;if(f)pet.className='anim-mini';else{pet.className='anim-'+cur;if(window.buddy)window.buddy.miniExit();}}
if(window.buddy){
  window.buddy.onStateChange(function(data){setMini(data.isMini);apply(data.state);});
  if(window.buddy.onShowBubble)window.buddy.onShowBubble(function(text){speak(text);});
  if(window.buddy.onPlaySound)window.buddy.onPlaySound(function(data){if(!data||!data.path)return;var a=new Audio('file://'+data.path);a.volume=data.volume||1;a.play().catch(function(){});});
  if(window.buddy.onGlobalMouse)window.buddy.onGlobalMouse(function(pos){var cx=window.screenX+W/2,cy=window.screenY+H/2;mx=Math.max(-5,Math.min(5,(pos.x-cx)/14));my=Math.max(-4,Math.min(4,(pos.y-cy)/14));});
}
// Boot
var img=new Image();
img.onload=function(){buildBody(sample(img));buildEyes('normal');buildMouth();buildCig();apply('idle');speak('$TACHI on BASE');tick();};
img.onerror=function(){console.error('CRAB IMAGE FAILED TO LOAD');};
img.src=CRAB_SRC;
</script>
