<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>$TACHI Crab — Companion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:340px;height:310px;background:#060608;font-family:'Courier New',monospace;overflow:hidden;margin:0;padding:0}
#stage{position:relative;width:340px;height:310px}
#pet{position:absolute;left:0;top:0;width:340px;height:310px;cursor:grab;transform-origin:center center;z-index:10}
#pet:active{cursor:grabbing}
canvas{display:block;width:340px;height:310px}
#emotion{position:absolute;top:4px;right:4px;font-size:10px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:60;font-family:'Courier New',monospace;color:#00ff41}
#emotion.show{opacity:1}
@keyframes idle-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes think-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes work-shake{0%,100%{transform:translateX(0)}33%{transform:translateX(-2px)}66%{transform:translateX(2px)}}
@keyframes happy-bounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-8px) rotate(-2deg)}70%{transform:translateY(-4px) rotate(2deg)}}
@keyframes error-wobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}80%{transform:rotate(-2deg)}}
@keyframes sleep-sway{0%,100%{transform:rotate(-1.5deg) translateY(2px)}50%{transform:rotate(1.5deg)}}
@keyframes juggle-spin{0%{transform:rotate(0) scale(.82)}50%{transform:rotate(180deg) scale(.78)}100%{transform:rotate(360deg) scale(.82)}}
@keyframes notif-jump{0%,100%{transform:translateY(0)}20%{transform:translateY(-10px)}40%{transform:translateY(0)}65%{transform:translateY(-5px)}}
@keyframes poke-react{0%{transform:scale(1) rotate(0)}30%{transform:scale(.88) rotate(-6deg)}70%{transform:scale(1.06) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.anim-idle{animation:idle-bob 2.5s ease-in-out infinite}
.anim-thinking{animation:think-pulse 1s ease-in-out infinite}
.anim-working,.anim-building,.anim-conducting,.anim-sweeping,.anim-carrying{animation:work-shake .22s linear infinite}
.anim-happy{animation:happy-bounce .6s ease-in-out 4}
.anim-error{animation:error-wobble .38s ease-in-out infinite}
.anim-sleeping{animation:sleep-sway 3.2s ease-in-out infinite}
.anim-juggling{animation:juggle-spin 1.1s linear infinite}
.anim-notification{animation:notif-jump .5s ease-in-out infinite}
.anim-poke{animation:poke-react .35s ease-in-out}
</style>
</head>
<body>
<div id="pet" class="anim-idle" style="position:absolute;left:0;top:0;width:340px;height:310px">
<div id="emotion"></div>

<canvas id="c" width="680" height="620"></canvas>
</div>

// ══════════════════════════════════════════════════════════════
// MOUTH = white smirk + cigarette + smoke particles
// All follow cursor direction like eyes
// ══════════════════════════════════════════════════════════════
const mouthGl=[];  // white smirk glyphs
const cigGl=[];    // cigarette body
const smokeP=[];   // smoke particles

function buildMouth(){
  const mcx=W*(FX+MX_OFF),mcy=H*(FY+MY_OFF);
  mouthGl.length=0;cigGl.length=0;

  // State-dependent mouth shapes
  const SHAPES={
    // {dx, dy, ch, w} arrays — w=weight for thickness
    idle:[
      // gentle smirk — asymmetric, right side higher
      {dx:-12,dy:2,ch:'▄'},{dx:-8,dy:1,ch:'▄'},{dx:-4,dy:.5,ch:'▄'},
      {dx:0,dy:0,ch:'▄'},{dx:4,dy:-.5,ch:'▄'},{dx:8,dy:-1.5,ch:'▄'},
      // thickness row
      {dx:-10,dy:3.5,ch:'▀'},{dx:-6,dy:2.5,ch:'▀'},{dx:-2,dy:1.5,ch:'▀'},
      {dx:2,dy:1,ch:'▀'},{dx:6,dy:.2,ch:'▀'},
    ],
    happy:[
      // wide W/ω shape
      {dx:-16,dy:-1,ch:'▄'},{dx:-12,dy:2,ch:'▄'},{dx:-8,dy:4,ch:'▄'},
      {dx:-4,dy:5.5,ch:'▄'},{dx:0,dy:6,ch:'▄'},{dx:4,dy:5.5,ch:'▄'},
      {dx:8,dy:4,ch:'▄'},{dx:12,dy:2,ch:'▄'},{dx:16,dy:-1,ch:'▄'},
      // teeth
      {dx:-6,dy:5,ch:'█'},{dx:-2,dy:6.5,ch:'█'},{dx:2,dy:6.5,ch:'█'},{dx:6,dy:5,ch:'█'},
    ],
    error:[
      // straight grimace
      {dx:-14,dy:0,ch:'▬'},{dx:-10,dy:0,ch:'▬'},{dx:-6,dy:0,ch:'▬'},
      {dx:-2,dy:0,ch:'▬'},{dx:2,dy:0,ch:'▬'},{dx:6,dy:0,ch:'▬'},
      {dx:10,dy:0,ch:'▬'},{dx:14,dy:0,ch:'▬'},
    ],
    sleeping:[
      // flat thin line
      {dx:-8,dy:0,ch:'─'},{dx:-4,dy:0,ch:'─'},{dx:0,dy:0,ch:'─'},
      {dx:4,dy:0,ch:'─'},{dx:8,dy:0,ch:'─'},
    ],
    notification:[
      // open mouth O
      {dx:-8,dy:0,ch:'('},{dx:8,dy:0,ch:')'},
      {dx:-5,dy:-3,ch:'▀'},{dx:0,dy:-4,ch:'▀'},{dx:5,dy:-3,ch:'▀'},
      {dx:-5,dy:3,ch:'▄'},{dx:0,dy:4,ch:'▄'},{dx:5,dy:3,ch:'▄'},
    ],
    thinking:[
      // slight open, corner up
      {dx:-10,dy:2,ch:'▄'},{dx:-6,dy:.5,ch:'▄'},{dx:-2,dy:0,ch:'▄'},
      {dx:2,dy:0,ch:'▄'},{dx:6,dy:-.5,ch:'▄'},{dx:10,dy:-1.5,ch:'▄'},
    ],
    working:[
      // focused thin line, slight tension
      {dx:-10,dy:.5,ch:'▬'},{dx:-6,dy:.2,ch:'▬'},{dx:-2,dy:0,ch:'▬'},
      {dx:2,dy:0,ch:'▬'},{dx:6,dy:-.2,ch:'▬'},{dx:10,dy:-.5,ch:'▬'},
    ],
  };

  const shape=SHAPES[cur]||SHAPES.idle;
  shape.forEach(m=>{
    mouthGl.push({
      hx:mcx+m.dx,hy:mcy+m.dy*1.5,
      x:mcx+m.dx,y:mcy+m.dy*1.5,
      vx:0,vy:0,ch:m.ch,ct:0,a:.95,ht:0,
    });
  });

  // Cigarette — single anchor point, drawn as solid shape in render
  const cigStart={x:mcx+shape[shape.length-1].dx+10,y:mcy-2};
  cigGl.push({
    hx:cigStart.x,hy:cigStart.y,
    x:cigStart.x,y:cigStart.y,
    vx:0,vy:0,a:.95,ht:0,isCigAnchor:true,
    emberColor:'#ff5500',
  });
}

function tickSmoke(){
  const mcx=W*(FX+MX_OFF),mcy=H*(FY+MY_OFF);
  const edx=Math.max(-6,Math.min(6,(mx-W*FX)/16));
  const edy=Math.max(-4,Math.min(4,(my-H*FY)/16));
  
  // Cigarette tip position from anchor
  const cigA=cigGl[0];
  const cigLen=30; // total length in px
  const cigAngle=-.13; // slight upward tilt
  const tipX=cigA?(cigA.x+Math.cos(cigAngle)*cigLen):mcx+44;
  const tipY=cigA?(cigA.y+Math.sin(cigAngle)*cigLen):mcy-4;
  if(cigA){
    const pulse=.7+Math.sin(gt*.12)*.3;
    cigA.emberColor=`hsl(${20+Math.sin(gt*.08)*10},100%,${Math.floor(50+pulse*25)}%)`;
  }

  // Emit smoke from tip
  if(gt%3===0&&cur!=='sleeping'){
    smokeP.push({
      x:tipX+Math.random()*3,y:tipY-2,
      vx:.2+edx*.05+(Math.random()-.5)*.3,
      vy:-.3-Math.random()*.4,
      life:40+Math.random()*30,age:0,
      ch:rc('░▒◦·'),size:3+Math.random()*2,
    });
  }
  // Big puff occasionally
  if(gt%40===0&&cur!=='sleeping'){
    for(let i=0;i<3;i++){
      smokeP.push({
        x:tipX+Math.random()*4,y:tipY-3,
        vx:.3+edx*.08+(Math.random()-.5)*.5,
        vy:-.5-Math.random()*.6,
        life:50+Math.random()*30,age:0,
        ch:rc('▒░◦'),size:4+Math.random()*3,
      });
    }
  }
  
  for(let i=smokeP.length-1;i>=0;i--){
    const s=smokeP[i];
    s.x+=s.vx;s.y+=s.vy;
    s.vx*=.98;s.vy*=.99;
    s.vy-=.005; // float up
    s.age++;
    if(s.age>s.life)smokeP.splice(i,1);
  }
}

// ══════════════════════════════════════════════════════════════
// MATRIX VERTICAL STREAMS — chars fall DOWN like Matrix rain
// Each column is one word spelled vertically + katakana noise
// ══════════════════════════════════════════════════════════════
const STREAM_WORDS=['$TACHI','AGENT','ROUTE','BUILD','GUARD','DEPLOY','BASE','SIGNAL','SWARM',
  'OPENCLAW','BANKR','COMPILE','EXECUTE','BRIDGE','VERIFY','PROCESS','SHIP','CHAIN','PROMPT'];

const vStreams=[];
function initVStreams(){
  for(let i=0;i<16;i++){
    const word=rc(STREAM_WORDS);
    const chars=[];
    // Build column: some katakana noise + the word spelled vertically + more noise
    const preNoise=2+((Math.random()*6)|0);
    const postNoise=2+((Math.random()*6)|0);
    for(let j=0;j<preNoise;j++)chars.push({ch:rc(KA),isWord:false});
    for(const c of word)chars.push({ch:c,isWord:true});
    for(let j=0;j<postNoise;j++)chars.push({ch:rc(KA),isWord:false});
    
    vStreams.push({
      x:8+Math.random()*(W-16),
      y:-chars.length*9-Math.random()*H,
      chars,
      speed:.3+Math.random()*1.5,
      alpha:.12+Math.random()*.18,
    });
  }
}
initVStreams();

function tickVStreams(){
  for(const s of vStreams){
    s.y+=s.speed*lStream;
    // Cycle non-word chars
    if(gt%6===0){
      for(const c of s.chars){
        if(!c.isWord&&Math.random()>.6)c.ch=rc(KA);
      }
    }
    // Reset when fallen off screen
    const totalH=s.chars.length*9;
    if(s.y>H+10){
      s.y=-totalH-Math.random()*100;
      s.x=8+Math.random()*(W-16);
      s.speed=.3+Math.random()*1.5;
      // New word
      const word=rc(STREAM_WORDS);
      s.chars.length=0;
      const pre=2+((Math.random()*6)|0);
      const post=2+((Math.random()*6)|0);
      for(let j=0;j<pre;j++)s.chars.push({ch:rc(KA),isWord:false});
      for(const c of word)s.chars.push({ch:c,isWord:true});
      for(let j=0;j<post;j++)s.chars.push({ch:rc(KA),isWord:false});
    }
  }
}

// ══════════════════════════════════════════════════════════════
// SPEECH — big letters fly from mouth, assemble nearby, scatter
// No frame/rectangle — just floating word formation
// ══════════════════════════════════════════════════════════════
const speechGl=[];
let speechQueue=[],speechTimer=0;

function speak(text){
  if(!text)return;
  speechQueue=[];speechTimer=0;speechGl.length=0;
  const chars=text.toUpperCase().split('');
  const mcx=W*(FX+MX_OFF),mcy=H*(FY+MY_OFF);
  // Target: arc above the crab head
  chars.forEach((ch,i)=>{
    const angle=-Math.PI*.7+i/(chars.length-1||1)*Math.PI*.4;
    const radius=55+chars.length*1.5;
    speechQueue.push({
      ch,delay:i*3,born:false,
      tx:W*FX+Math.cos(angle)*radius,
      ty:H*FY+Math.sin(angle)*radius-15,
    });
  });
}

function tickSpeech(){
  speechTimer++;
  const mcx=W*(FX+MX_OFF),mcy=H*(FY+MY_OFF);
  for(const q of speechQueue){
    if(!q.born&&speechTimer>=q.delay){
      q.born=true;
      speechGl.push({
        ch:rc(KA),target:q.ch,
        x:mcx+(Math.random()-.5)*14,y:mcy+(Math.random()-.5)*8,
        tx:q.tx,ty:q.ty,vx:0,vy:0,
        age:0,maxAge:180,morphAt:20,holdAt:50,scatterAt:130,size:5,
      });
    }
  }
  for(let i=speechGl.length-1;i>=0;i--){
    const s=speechGl[i];s.age++;
    if(s.age<s.morphAt){
      s.x+=(s.tx-s.x)*.07;s.y+=(s.ty-s.y)*.07;
      if(s.age%2===0)s.ch=rc(KA);
      s.size=5+s.age/s.morphAt*5;
    }else if(s.age===s.morphAt){s.ch=s.target;}
    else if(s.age<s.holdAt){s.x+=(s.tx-s.x)*.14;s.y+=(s.ty-s.y)*.14;s.size=10;}
    else if(s.age<s.scatterAt){s.x+=(s.tx-s.x)*.03;s.y+=(s.ty-s.y)*.03;s.x+=Math.sin(gt*.025+i)*.15;s.size=10;}
    else{
      if(s.age===s.scatterAt){s.vx=(Math.random()-.5)*3;s.vy=-Math.random()*2-.3;}
      s.x+=s.vx;s.y+=s.vy;s.vy+=.008;
      if(s.age%3===0)s.ch=rc(KA);
      s.size=Math.max(3,10-(s.age-s.scatterAt)*.05);
    }
    if(s.age>s.maxAge)speechGl.splice(i,1);
  }
}

function sample(img){
  const o=document.createElement('canvas');o.width=W;o.height=H;
  const oc=o.getContext('2d');const s=Math.min(W*.84,H*.88);
  const ix=W*.5-s*.5,iy=H*.06;
  oc.drawImage(img,ix,iy,s,s*(img.height/img.width));
  const d=oc.getImageData(0,0,W,H).data;const pts=[];const gap=8;
  for(let py=0;py<H;py+=gap){for(let px=0;px<W;px+=gap){
    const i=(py*W+px)*4;const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
    if(a>28){const gn=g>r*1.2&&g>b*1.2&&g>70;const dk=(r+g+b)/3<35;const br=(r+g+b)/3>200;
      let t=1;if(gn)t=5;else if(dk)t=4;else if(br)t=8;pts.push({x:px,y:py,t,gn});}
  }}return pts;
}

function buildBody(pts){
  gl=pts.map(p=>{let ch,pl;if(p.t===5){ch=rc(EN);pl=EN;}else if(p.t===4){ch=rc(ME);pl=ME;}else if(p.t===8){ch=rc(CR);pl=CR;}else{ch=rc(KA);pl=KA;}
    return{ch,pl,t:p.t,gn:p.gn,hx:p.x,hy:p.y,x:p.x+(Math.random()-.5)*W*2.5,y:-Math.random()*H*2.5,vx:0,vy:0,rot:(Math.random()-.5)*4,vr:0,ht:1,a:0,ct:Math.random()*80};});
}

function buildEyes(eyeKey){
  const ecx=W*FX,ecy=H*FY;const ed=EYES[eyeKey]||EYES.normal;
  eyeGl.length=0;const lx=ecx-EYE_GAP*.5,rx=ecx+EYE_GAP*.5;
  const MP='アイウカキクケコサシスセタチツテトナニヌネノハヒ01$◆░▒▓';

  function addEye(cx,cy,ew,eh,flash){
    for(let ey=-eh;ey<=eh;ey+=1){
      for(let ex=-ew;ex<=ew;ex+=1){
        const nx=ew>0?ex/ew:0,ny=eh>0?ey/eh:0;
        if(nx*nx+ny*ny>1.18)continue;
        const dist=Math.sqrt(nx*nx+ny*ny);
        const isCore=dist<.35;
        eyeGl.push({hx:cx+ex*5.5,hy:cy+ey*4.5,x:cx+ex*5.5,y:cy+ey*4.5,
          vx:0,vy:0,ht:.1,a:.9,ch:rc(MP),ct:0,
          isShine:false,isPupil:isCore,dist,xFlash:flash,
          rainPhase:Math.random()*60,rainSpeed:.4+Math.random()*1.2,
        });
      }
    }
    // White shine dot — clamped to stay inside eye
    const shR=Math.max(ew,eh)*4.5; // max wander radius
    eyeGl.push({hx:cx-2,hy:cy-eh*2.8,x:cx-2,y:cy-eh*2.8,
      vx:0,vy:0,ht:.05,a:1,ch:'▪',ct:0,isShine:true,dist:0,
      eyeCx:cx,eyeCy:cy,shineR:shR});
  }

  addEye(lx,ecy,ed.lw,ed.lh,ed.xFlash);
  addEye(rx,ecy,ed.rw,ed.rh,ed.xFlash);
}

const orbs=[{label:'B',color:'#7b5bf5',r:7},{label:'$',color:'#00ff41',r:5.5},{label:'◆',color:'#ff1a1a',r:5}];
const rn=[];for(let i=0;i<18;i++){const d={x:(i/18)*W+Math.random()*(W/18),y:Math.random()*H,sp:.3+Math.random()*2,ch:[],ln:3+((Math.random()*8)|0),t:0};for(let j=0;j<d.ln;j++)d.ch.push(rc(KA));rn.push(d);}
const bl=[];function bolt(){if(bl.length>3)return;const sx=W*.2+Math.random()*W*.6,sy=H*.03+Math.random()*H*.3;const sg=[];let bx=sx,by=sy;const n=3+((Math.random()*5)|0);for(let i=0;i<n;i++){const nx=bx+(Math.random()-.5)*30,ny=by+7+Math.random()*16;sg.push({x1:bx,y1:by,x2:nx,y2:ny});bx=nx;by=ny;}bl.push({sg,l:0,m:8+Math.random()*8});}
const sparks=[];function emit(cx,cy,n,color,sp){for(let i=0;i<n;i++)sparks.push({x:cx,y:cy,vx:(Math.random()-.5)*sp,vy:(Math.random()-.5)*sp-1,life:18+Math.random()*18,age:0,ch:rc('✦✧◆◇⬢'),color});}

let cur='idle',cf=ST.idle,gt=0;
let lC=0,lR=.15,lP=0,lOrb=0,lStream=0;
let mx=W/2,my=H/2;
const pet=document.getElementById('pet');
const emo=document.getElementById('emotion');

function bst(f){const all=[...gl,...eyeGl,...mouthGl,...cigGl];const cx=W*FX,cy=H*FY;for(const g of all){const dx=g.x-cx,dy=g.y-cy,d=Math.max(1,Math.sqrt(dx*dx+dy*dy));g.vx+=(dx/d)*f*(.4+Math.random());g.vy+=(dy/d)*f*(.4+Math.random());if(g.vr!==undefined)g.vr+=(Math.random()-.5)*f*.1;g.ht=1;}}
function bstAt(cx,cy,r,f){const all=[...gl,...eyeGl,...mouthGl,...cigGl];for(const g of all){const dx=g.x-cx,dy=g.y-cy,d2=dx*dx+dy*dy;if(d2>r*r)continue;const d=Math.max(1,Math.sqrt(d2)),p=(1-d/r)*f;g.vx+=(dx/d)*p;g.vy+=(dy/d)*p;if(g.vr!==undefined)g.vr+=(Math.random()-.5)*p*.15;g.ht=1;}}

function apply(s){
  const c=ST[s]||ST.idle;cur=s;cf=c;pet.className='anim-'+s;
  buildEyes(c.eye);buildMouth();speak(c.msg);
  const em=EM[s];if(em){emo.textContent=em;emo.classList.add('show');setTimeout(()=>emo.classList.remove('show'),2000);}
  if(s==='error'){bst(c.ch*9);bolt();bolt();emit(W*FX,H*FY,12,'#ff3300',4);}
  if(s==='juggling'||s==='notification'){bst(c.ch*7);bolt();}
  if(s==='happy')emit(W*FX,H*(FY-.08),14,'#44ff44',3);
  
  
}

cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);});
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();const cx=(e.clientX-r.left)*(W/r.width),cy=(e.clientY-r.top)*(H/r.height);bstAt(cx,cy,75,5);bolt();emit(cx,cy,8,cf.e,3);speak('$TACHI snaps');});

function tick(){
  gt++;
  lC+=(cf.ch-lC)*.04;lR+=(cf.r-lR)*.04;lP+=(cf.p-lP)*.05;lOrb+=(cf.orb-lOrb)*.06;lStream+=(cf.stream-lStream)*.03;

  const sp=.043,dm=.87,slp=cur==='sleeping';
  for(const g of gl){
    g.vx+=(g.hx-g.x)*sp;g.vy+=(g.hy-g.y)*sp;
    if(lC>0){g.vx+=(Math.random()-.5)*lC*2;g.vy+=(Math.random()-.5)*lC*2;g.vr+=(Math.random()-.5)*lC*.05;}
    g.vx*=dm;g.vy*=dm;g.vr*=.9;g.x+=g.vx;g.y+=g.vy;g.rot+=g.vr;g.rot*=.95;
    g.ht*=.955;g.a+=(1-g.a)*.04;g.ct--;
    if(g.ct<=0&&(g.t===1||g.t===8)){g.ch=rc(g.pl);g.ct=(g.ht>.3?2:16)+Math.random()*8;}
    if(slp)g.x+=Math.sin(gt*.005+g.hx*.01)*.03;
  }

  // Eyes — shines track cursor
  const edx=Math.max(-7,Math.min(7,(mx-W*FX)/15));
  const edy=Math.max(-5,Math.min(5,(my-H*FY)/15));
  const fsp=.1,fdm=.8;
  for(const g of eyeGl){
    const tx=g.isShine?g.hx+edx*1.8:g.hx+edx*.4;
    const ty=g.isShine?g.hy+edy*1.5:g.hy+edy*.4;
    g.vx+=(tx-g.x)*fsp;g.vy+=(ty-g.y)*fsp;g.vx*=fdm;g.vy*=fdm;g.x+=g.vx;g.y+=g.vy;
    // Clamp shine dot inside eye orbit
    if(g.isShine&&g.eyeCx!==undefined){
      const sdx=g.x-g.eyeCx,sdy=g.y-g.eyeCy;
      const sd=Math.sqrt(sdx*sdx+sdy*sdy);
      if(sd>g.shineR){g.x=g.eyeCx+sdx/sd*g.shineR;g.y=g.eyeCy+sdy/sd*g.shineR;g.vx*=.2;g.vy*=.2;}
    }
    g.ht*=.95;g.a+=(1-g.a)*.07;
    // Matrix rain: fast cycling chars, faster at edges
    if(!g.isShine){
      g.rainPhase+=g.rainSpeed;
      if(g.rainPhase>1){g.rainPhase=0;g.ch=rc('アイウカキクケコサシスセタチツテトナニヌネノハヒ01$◆░▒▓');}
    }
  }

  // Mouth + cigarette follow cursor (like eyes, lighter)
  for(const g of mouthGl){
    const tx=g.hx+edx*.6,ty=g.hy+edy*.5;
    g.vx+=(tx-g.x)*fsp;g.vy+=(ty-g.y)*fsp;g.vx*=fdm;g.vy*=fdm;g.x+=g.vx;g.y+=g.vy;
    g.ht*=.95;g.a+=(1-g.a)*.08;g.ct--;
    if(g.ct<=0){g.ch=rc('█▓');g.ct=20+Math.random()*12;}
  }
  for(const g of cigGl){
    const tx=g.hx+edx*.7,ty=g.hy+edy*.5;
    g.vx+=(tx-g.x)*fsp;g.vy+=(ty-g.y)*fsp;g.vx*=fdm;g.vy*=fdm;g.x+=g.vx;g.y+=g.vy;
    g.ht*=.95;g.a+=(1-g.a)*.08;
  }

  tickSmoke();
  tickSpeech();
  if(lStream>.02)tickVStreams();

  for(const d of rn){d.y+=d.sp*lR*1.4;d.t++;if(d.t%4===0)d.ch[0]=rc(KA);if(d.y>H+d.ln*8){d.y=-d.ln*8;d.x=Math.random()*W;d.sp=.3+Math.random()*2;}}
  if((lP>.3||lC>.15)&&Math.random()<.01)bolt();
  for(let i=bl.length-1;i>=0;i--){bl[i].l++;if(bl[i].l>bl[i].m)bl.splice(i,1);}
  for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=.05;s.age++;if(s.age>s.life)sparks.splice(i,1);}

  render();requestAnimationFrame(tick);
}

function render(){
  ctx.clearRect(0,0,W,H);const sc=cf.c,ec=cf.e;

  // ── Vertical matrix streams (BEHIND) ───────────────────────
  if(lStream>.02){
    ctx.textBaseline='top';ctx.textAlign='center';
    for(const s of vStreams){
      for(let ci=0;ci<s.chars.length;ci++){
        const cy=s.y+ci*9;
        if(cy<-9||cy>H)continue;
        const c=s.chars[ci];
        // Head char = bright
        const isHead=ci===s.chars.length-1;
        ctx.globalAlpha=isHead?s.alpha*lStream*2.5:s.alpha*lStream*(c.isWord?1.5:1);
        ctx.fillStyle=isHead?'#ffffff':c.isWord?ec:'#00882a';
        ctx.font=c.isWord?'bold 8px "Courier New"':'7px "Courier New"';
        ctx.fillText(c.ch,s.x,cy);
      }
    }
  }

  // Rain
  if(lR>.02){ctx.font='6px "Courier New"';ctx.textBaseline='top';ctx.textAlign='left';
    for(const d of rn){for(let j=0;j<d.ch.length;j++){const cy=d.y-j*8;if(cy<-8||cy>H)continue;ctx.globalAlpha=(j===0?1:Math.max(.03,1-j/d.ln))*lR*.1;ctx.fillStyle=j===0?'#fff':ec;ctx.fillText(d.ch[j],d.x,cy);}}}

  // Lightning
  for(const b of bl){const a=Math.max(0,1-b.l/b.m);ctx.globalAlpha=a*.7;ctx.strokeStyle=ec;ctx.lineWidth=1.5;ctx.beginPath();for(const s of b.sg){ctx.moveTo(s.x1+(Math.random()-.5)*2,s.y1);ctx.lineTo(s.x2+(Math.random()-.5)*2,s.y2);}ctx.stroke();ctx.globalAlpha=a*.3;ctx.strokeStyle='#fff';ctx.lineWidth=.8;ctx.stroke();}

  // Body
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.font='bold 5px "Courier New"';
  for(const g of gl){
    if(g.a<.02)continue;
    let color=sc;if(g.t===5||g.gn)color=ec;else if(g.t===4)color='#444';else if(g.t===8)color=`hsl(${(gt*2+g.hx*.5)%360},70%,55%)`;
    let alpha=Math.min(1,g.a+g.ht*.4);if(lP>0)alpha=Math.min(1,alpha+Math.sin(gt*.06+g.hx*.015+g.hy*.015)*lP*.07);
    ctx.globalAlpha=alpha;ctx.fillStyle=color;
    if(Math.abs(g.rot)<.015)ctx.fillText(g.ch,g.x,g.y);
    else{ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.fillText(g.ch,0,0);ctx.restore();}
  }

  // ── Matrix Eyes ────────────────────────────────────────────
  for(const g of eyeGl){
    if(g.a<.02)continue;
    ctx.globalAlpha=Math.min(1,g.a+g.ht*.3);
    if(g.isShine){
      ctx.fillStyle='#ffffff';
      ctx.font='bold 6px "Courier New"';
      ctx.globalAlpha*=.9;
    } else if(g.xFlash&&gt%8<4){
      // Error flash: red matrix
      const br=1-g.dist*.6;
      ctx.fillStyle=`rgb(${Math.floor(200+br*55)},${Math.floor(br*30)},0)`;
      ctx.font='bold 5px "Courier New"';
    } else {
      // Matrix green gradient: bright green center → dark green edge
      const br=Math.max(0,1-g.dist*.75);
      const gv=Math.floor(80+br*175);
      const rv=Math.floor(br*15);
      // Head char (top of column) = white
      if(g.isPupil){ctx.fillStyle=`rgb(${Math.floor(150+br*105)},255,${Math.floor(150+br*105)})`;}
      else{ctx.fillStyle=`rgb(${rv},${gv},${Math.floor(rv*.3)})`;}
      ctx.font=(g.dist<.5?'bold ':'')+`${g.dist<.4?6:5}px "Courier New"`;
    }
    ctx.fillText(g.ch,g.x,g.y);
  }

  // ── Mouth ──────────────────────────────────────────────────
  ctx.font='bold 5.5px "Courier New"';
  const mclr=cur==='error'?'#ff4444':cur==='happy'?'#ffffff':cur==='sleeping'?'#aaaaaa':'#e8e4de';
  for(const g of mouthGl){
    if(g.a<.02)continue;
    ctx.globalAlpha=Math.min(1,g.a)*.92;
    ctx.fillStyle=g.ch==='█'?'#ffffff':mclr; // teeth = white
    ctx.fillText(g.ch,g.x,g.y);
  }

  // ── Cigarette (solid canvas shape) ────────────────────────
  if(cigGl.length>0){
    const cg=cigGl[0];
    const cx0=cg.x,cy0=cg.y;
    const cLen=30,cAngle=-.13,cH=3.5;
    const ca=Math.cos(cAngle),sa=Math.sin(cAngle);
    ctx.save();
    ctx.translate(cx0,cy0);
    ctx.rotate(cAngle);
    ctx.globalAlpha=Math.min(1,cg.a)*.92;

    // Body (white/ivory)
    ctx.fillStyle='#ede8de';
    ctx.beginPath();
    ctx.rect(0,-cH*.5,cLen*.72,cH);
    ctx.fill();

    // Filter (orange-tan band)
    ctx.fillStyle='#cc7744';
    ctx.beginPath();
    ctx.rect(cLen*.72,-cH*.5,cLen*.12,cH);
    ctx.fill();

    // Ember tip — glowing dot
    const pulse=.7+Math.sin(gt*.12)*.3;
    const ec=cg.emberColor||'#ff5500';
    // Outer glow
    ctx.globalAlpha*=.25*pulse;
    ctx.fillStyle='#ff8800';
    ctx.beginPath();
    ctx.arc(cLen*.88,0,cH*1.6,0,Math.PI*2);
    ctx.fill();
    // Inner ember
    ctx.globalAlpha*=4;
    ctx.fillStyle=ec;
    ctx.beginPath();
    ctx.arc(cLen*.88,0,cH*.75,0,Math.PI*2);
    ctx.fill();
    // Hot core
    ctx.globalAlpha*=1.2;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.arc(cLen*.88,0,cH*.3,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  // ── Smoke ──────────────────────────────────────────────────
  ctx.textBaseline='middle';ctx.textAlign='center';
  for(const s of smokeP){
    const lr=s.age/s.life;
    const alpha=Math.max(0,(1-lr)*.45);
    ctx.globalAlpha=alpha;
    // Smoke goes from warm yellow near ember → cool grey → white
    const warm=Math.max(0,1-lr*3);
    const r=Math.floor(160+warm*60),gv=Math.floor(150+warm*40),b=Math.floor(150);
    ctx.fillStyle=`rgb(${r},${gv},${b})`;
    ctx.font=`${Math.floor(s.size+lr*4)}px "Courier New"`;
    ctx.fillText(s.ch,s.x,s.y);
  }

  // ── Speech ─────────────────────────────────────────────────
  for(const s of speechGl){
    const lr=s.age/s.maxAge;
    let alpha=lr<.08?lr/.08:lr>.75?1-(lr-.75)/.25:1;
    let color=s.age<s.morphAt?'#ff1a1a':s.age<s.scatterAt?'#ff4444':'#661111';
    ctx.globalAlpha=alpha*.88;ctx.fillStyle=color;
    ctx.font=`bold ${s.size}px "Courier New"`;
    ctx.fillText(s.ch,s.x,s.y);
  }

  // Orbits
  if(lOrb>.05){const orbR=Math.min(W,H)*.36;ctx.font='bold 8px "Courier New"';ctx.textBaseline='middle';ctx.textAlign='center';
    orbs.forEach((ob,oi)=>{const ang=gt*.025*lOrb+oi*2.094;const ox=W*FX+orbR*Math.cos(ang),oy=H*FY+orbR*Math.sin(ang)*.6;ctx.globalAlpha=lOrb*.75;ctx.fillStyle=ob.color;ctx.beginPath();ctx.arc(ox,oy,ob.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=lOrb*.9;ctx.fillText(ob.label,ox,oy+1);});}

  // Sparks
  if(sparks.length){ctx.font='bold 6px "Courier New"';ctx.textBaseline='middle';ctx.textAlign='center';
    for(const s of sparks){ctx.globalAlpha=Math.max(0,1-s.age/s.life)*.8;ctx.fillStyle=s.color;ctx.fillText(s.ch,s.x,s.y);}}

  // ZZZ
  if(cur==='sleeping'){ctx.globalAlpha=.4+Math.sin(gt*.03)*.25;ctx.fillStyle='#1a4422';ctx.textBaseline='middle';ctx.textAlign='center';const zo=Math.sin(gt*.02)*3;const fx=W*FX,fy=H*FY;ctx.font='bold 11px "Courier New"';ctx.fillText('Z',fx+42,fy-24+zo);ctx.font='bold 15px "Courier New"';ctx.fillText('Z',fx+53,fy-35+zo*.7);ctx.font='bold 20px "Courier New"';ctx.fillText('Z',fx+66,fy-46+zo*.4);}
  if(cur==='thinking'){ctx.globalAlpha=.45+Math.sin(gt*.05)*.2;const fx=W*FX,fy=H*FY;ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='bold 4px "Courier New"';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('◇',fx+34,fy-14);ctx.font='bold 6px "Courier New"';ctx.fillText('◆',fx+42,fy-22);ctx.font='bold 9px "Courier New"';ctx.fillText('◈',fx+52,fy-30);ctx.fillStyle='#ff4d6d';ctx.font='bold 7px "Courier New"';ctx.fillText('?',fx+52,fy-29);}
  if(cur==='happy'){ctx.globalAlpha=.6+Math.sin(gt*.08)*.3;ctx.fillStyle='#44ff44';ctx.font='bold 8px "Courier New"';ctx.textBaseline='middle';ctx.textAlign='center';const fx=W*FX,fy=H*FY;ctx.fillText('✦',fx-44+Math.sin(gt*.03)*4,fy-36);ctx.fillText('✧',fx+50+Math.cos(gt*.04)*3,fy-28);ctx.fillStyle='#ff1a1a';ctx.font='bold 6px "Courier New"';ctx.fillText('✦',fx-28,fy+44+Math.sin(gt*.05)*3);}

  ctx.globalAlpha=.012;ctx.fillStyle='#000';for(let sy=0;sy<H;sy+=4)ctx.fillRect(0,sy,W,1);
  ctx.globalAlpha=1;
}


const img=new Image();
img.onload=()=>{buildBody(sample(img));buildEyes('normal');buildMouth();apply('idle');tick();};
img.src=CRAB_SRC;

// ── Bankr Buddy IPC bridge ────────────────────────────────
(function(){
  const bubble=document.getElementById('bubble');
  function showBubble(t){
    if(!bubble)return;
    bubble.textContent=t||'';
    bubble.style.opacity='1';
    setTimeout(()=>{bubble.style.opacity='0';},2400);
  }
  if(window.buddy){
    window.buddy.onStateChange((data)=>{
      if(data&&data.state)apply(data.state);
    });
    window.buddy.onShowBubble((text)=>{
      speak(text);
      showBubble(text);
    });
  }
  // drag support
  const pet=document.getElementById('pet');
  let dragging=false,dragOffX=0,dragOffY=0,isDragMoved=false,startSX=0,startSY=0;
  const THRESH=6;
  pet.addEventListener('mousedown',(e)=>{
    if(e.button!==0)return;
    dragging=true;isDragMoved=false;
    startSX=e.screenX;startSY=e.screenY;
    dragOffX=e.screenX-window.screenX;dragOffY=e.screenY-window.screenY;
    if(window.buddy)window.buddy.enableMouse();
  });
  document.addEventListener('mousemove',(e)=>{
    if(!dragging)return;
    const dx=e.screenX-startSX,dy=e.screenY-startSY;
    if(Math.abs(dx)>THRESH||Math.abs(dy)>THRESH)isDragMoved=true;
    if(isDragMoved)window.moveTo(e.screenX-dragOffX,e.screenY-dragOffY);
  });
  document.addEventListener('mouseup',(e)=>{
    if(!dragging||e.button!==0)return;
    dragging=false;
    if(window.buddy)window.buddy.dragEnd({x:window.screenX,y:window.screenY});
    if(!isDragMoved){speak('$TACHI snaps');}
    if(window.buddy)window.buddy.disableMouse();
  });
  pet.addEventListener('mouseenter',()=>{if(!dragging&&window.buddy)window.buddy.enableMouse();});
  pet.addEventListener('mouseleave',()=>{if(!dragging&&window.buddy)window.buddy.disableMouse();});
})();
</script>
