<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
html, body { width:160px; height:200px; background:transparent; overflow:hidden; font-family:'Courier New',Courier,monospace; image-rendering:pixelated; }
#pet { position:absolute; left:15px; top:50px; cursor:grab; transform-origin:center bottom; image-rendering:pixelated; }
#pet:active { cursor:grabbing; }
#bubble { position:absolute; top:4px; left:50%; transform:translateX(-50%); background:#fcfc00; color:#000; font-size:9px; font-weight:bold; line-height:1.3; padding:4px 8px; border:2px solid #000; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:99; max-width:150px; text-align:center; }
#bubble.show { opacity:1; }
#bubble::after { content:''; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); border:3px solid transparent; border-top-color:#000; }
#bubble::before { content:''; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%); border:3px solid transparent; border-top-color:#fcfc00; z-index:1; }
#emotion { position:absolute; top:0; right:0; font-size:13px; pointer-events:none; opacity:0; transition:opacity 0.12s; }
#emotion.show { opacity:1; }
@keyframes idle-bob     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes think-pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes work-shake   { 0%,100%{transform:translateX(0)} 33%{transform:translateX(-2px)} 66%{transform:translateX(2px)} }
@keyframes happy-bounce { 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-15px) rotate(-4deg)} 50%{transform:translateY(-8px) rotate(0deg)} 75%{transform:translateY(-18px) rotate(4deg)} }
@keyframes error-wobble { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} 80%{transform:rotate(-4deg)} }
@keyframes sleep-sway   { 0%,100%{transform:rotate(-3deg) translateY(2px)} 50%{transform:rotate(3deg)} }
@keyframes juggle-spin  { 0%{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.06)} 100%{transform:rotate(360deg) scale(1)} }
@keyframes conduct-wave { 0%,100%{transform:translateX(0) scaleX(1)} 33%{transform:translateX(-3px) scaleX(0.96)} 66%{transform:translateX(3px) scaleX(1.04)} }
@keyframes notif-jump   { 0%,100%{transform:translateY(0)} 20%{transform:translateY(-11px)} 40%{transform:translateY(0)} 65%{transform:translateY(-6px)} 80%{transform:translateY(0)} }
@keyframes sweep-slide  { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }
@keyframes carry-waddle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg) translateY(-2px)} 75%{transform:rotate(4deg) translateY(-2px)} }
@keyframes poke-react   { 0%{transform:scale(1) rotate(0)} 30%{transform:scale(0.84) rotate(-9deg)} 70%{transform:scale(1.07) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
@keyframes hand-pump    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.anim-idle{animation:idle-bob 2.4s ease-in-out infinite;}
.anim-thinking{animation:think-pulse .9s ease-in-out infinite;}
.anim-working{animation:work-shake .2s linear infinite;}
.anim-building{animation:work-shake .15s linear infinite;}
.anim-happy{animation:happy-bounce .6s ease-in-out 4;}
.anim-error{animation:error-wobble .36s ease-in-out infinite;}
.anim-sleeping{animation:sleep-sway 3.2s ease-in-out infinite;}
.anim-juggling{animation:juggle-spin 1.1s linear infinite;}
.anim-conducting{animation:conduct-wave .72s ease-in-out infinite;}
.anim-notification{animation:notif-jump .48s ease-in-out infinite;}
.anim-sweeping{animation:sweep-slide .88s ease-in-out infinite;}
.anim-carrying{animation:carry-waddle .68s ease-in-out infinite;}
.anim-mini{animation:idle-bob 3s ease-in-out infinite;}
.anim-poke{animation:poke-react .38s ease-in-out;}
.hand-pump{animation:hand-pump .2s linear infinite;transform-origin:50% 100%;}
</style>
</head>

  idle:         { bubble:'',             t:0,z:0,err:0,st:0,orb:0, arms:'idle'    },
  thinking:     { bubble:'thinking...',  t:1,z:0,err:0,st:0,orb:0, arms:'idle'    },
  working:      { bubble:'on it...',     t:0,z:0,err:0,st:0,orb:0, arms:'pump'    },
  building:     { bubble:'building!',    t:0,z:0,err:0,st:0,orb:0, arms:'pump'    },
  happy:        { bubble:'done! \u2713', t:0,z:0,err:0,st:1,orb:0, arms:'up'      },
  error:        { bubble:'uh oh...',     t:0,z:0,err:1,st:0,orb:0, arms:'idle'    },
  sleeping:     { bubble:'',             t:0,z:1,err:0,st:0,orb:0, arms:'down'    },
  juggling:     { bubble:'routing!',     t:0,z:0,err:0,st:0,orb:1, arms:'pump'    },
  conducting:   { bubble:'multi-agent!', t:0,z:0,err:0,st:0,orb:1, arms:'conduct' },
  notification: { bubble:'hey!',         t:0,z:0,err:0,st:0,orb:0, arms:'up'      },
  sweeping:     { bubble:'compacting...',t:0,z:0,err:0,st:0,orb:0, arms:'idle'    },
  carrying:     { bubble:'carrying...', t:0,z:0,err:0,st:0,orb:0,  arms:'up'      },
};
const EMOTIONS = { working:'⚡', building:'🔨', happy:'★', error:'✗', notification:'!' };

const pet    = document.getElementById('pet');
const bubble = document.getElementById('bubble');
const emEl   = document.getElementById('emotion');
const thought= document.getElementById('thought');
const zzzs   = document.getElementById('zzzs');
const errx   = document.getElementById('errx');
const stars  = document.getElementById('stars');
const orbit  = document.getElementById('orbit');
const o1     = document.getElementById('o1');
const o1t    = document.getElementById('o1t');
const o2     = document.getElementById('o2');
const o3     = document.getElementById('o3');
const handL  = document.getElementById('grp-hand-l');
const handR  = document.getElementById('grp-hand-r');
const eyeL   = document.getElementById('eye-l');
const eyeR   = document.getElementById('eye-r');
const m1a    = document.getElementById('m1a');
const m1b    = document.getElementById('m1b');
const m1c    = document.getElementById('m1c');
const m2a    = document.getElementById('m2a');
const m2b    = document.getElementById('m2b');

// Original Y positions of mouth pixels (scale 5x of grid coords 18,19)
const SMILE_Y = { m1a:90, m1b:90, m1c:90, m2a:95, m2b:95 };
const SAD_Y   = { m1a:95, m1b:95, m1c:95, m2a:90, m2b:90 };

let curState='idle', isMini=false, bubTimer=null;
let clickCount=0, clickTimer=null, dragging=false, dragOffX=0, dragOffY=0;

function applyFace(state) {
  const fc = FACE[state] || FACE.idle;
  if (eyeL) { eyeL.setAttribute('fill', fc.el); eyeR.setAttribute('fill', fc.er); }

  // Mouth pixels
  const mouth = fc.smile || fc.sad;
  const yMap  = fc.sad ? SAD_Y : SMILE_Y;
  [m1a,m1b,m1c,m2a,m2b].forEach((el,i)=>{
    if (!el) return;
    const key = ['m1a','m1b','m1c','m2a','m2b'][i];
    el.setAttribute('fill', mouth ? '#52ff00' : '#000000');
    el.setAttribute('y', yMap[key]);
  });
}

function applyState(state) {
  const cfg = STATES[state] || STATES.idle;
  curState = state;
  pet.className = 'anim-' + (isMini ? 'mini' : state);
  applyFace(state);

  thought.style.opacity = cfg.t   ? '1' : '0';
  zzzs.style.opacity    = cfg.z   ? '1' : '0';
  errx.style.opacity    = cfg.err ? '1' : '0';
  stars.style.opacity   = cfg.st  ? '1' : '0';
  orbit.style.opacity   = cfg.orb ? '1' : '0';

  if (handL && handR) {
    handL.className = handR.className = cfg.arms === 'pump' ? 'hand-pump' : '';
    const shift = { up:-7, down:6, idle:0, pump:0, conduct:0 }[cfg.arms] ?? 0;
    handL.style.transform = handR.style.transform = `translateY(${shift}px)`;
  }

  if (cfg.bubble) { showBubble(cfg.bubble); }
  else if (state !== 'idle') { hideBubble(); }

  const em = EMOTIONS[state];
  if (em) { emEl.textContent=em; emEl.classList.add('show'); setTimeout(()=>emEl.classList.remove('show'),2000); }
}

function showBubble(t) { clearTimeout(bubTimer); bubble.textContent=t; bubble.classList.add('show'); bubTimer=setTimeout(hideBubble,3200); }
function hideBubble() { bubble.classList.remove('show'); }

// Orbit
let ang=0;
(function tick(){
  ang+=0.032;
  const cx=65,cy=67,r=55;
  o1.setAttribute('cx',cx+r*Math.cos(ang));       o1.setAttribute('cy',cy+r*Math.sin(ang));
  o1t.setAttribute('x',cx+r*Math.cos(ang));        o1t.setAttribute('y',cy+r*Math.sin(ang)+3);
  o2.setAttribute('cx',cx+r*Math.cos(ang+2.09));   o2.setAttribute('cy',cy+r*Math.sin(ang+2.09));
  o3.setAttribute('cx',cx+r*Math.cos(ang+4.18));   o3.setAttribute('cy',cy+r*Math.sin(ang+4.18));
  requestAnimationFrame(tick);
}());

// Eye tracking
document.addEventListener('mousemove',(e)=>{
  if (curState!=='idle'&&curState!=='thinking') return;
  if (!eyeL) return;
  const r=pet.getBoundingClientRect();
  const ox=Math.max(-4,Math.min(4,(e.clientX-(r.left+r.width/2))/window.innerWidth*10));
  const oy=Math.max(-2,Math.min(2,(e.clientY-(r.top+r.height/2))/window.innerHeight*6));
  eyeL.setAttribute('x',60+ox); eyeL.setAttribute('y',80+oy);
  eyeR.setAttribute('x',80+ox); eyeR.setAttribute('y',80+oy);
});

// Drag
pet.addEventListener('mousedown',(e)=>{if(e.button!==0)return;dragging=true;dragOffX=e.screenX-window.screenX;dragOffY=e.screenY-window.screenY;window.buddy.enableMouse();e.preventDefault();});
document.addEventListener('mousemove',(e)=>{if(!dragging)return;window.moveTo(e.screenX-dragOffX,e.screenY-dragOffY);});
document.addEventListener('mouseup',(e)=>{if(!dragging||e.button!==0)return;dragging=false;window.buddy.dragEnd({x:window.screenX,y:window.screenY});});

// Clicks
pet.addEventListener('click',()=>{
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer=setTimeout(()=>{
    if(clickCount>=1){
       if (curState === 'happy' || curState === 'sleeping') {
         window.buddy.forceState('idle');
       }
       pet.classList.add('anim-poke');
       setTimeout(()=>pet.classList.remove('anim-poke'),420);
       showBubble('Ok');
       window.buddy.soundTest('session.start');
    }
    clickCount=0;
  },350);
});

pet.addEventListener('mouseenter',()=>{if(!dragging)window.buddy.enableMouse();});
pet.addEventListener('mouseleave',()=>{if(!dragging)window.buddy.disableMouse();});

function setMini(flag){isMini=flag;pet.className='anim-'+(flag?'mini':curState);if(!flag)window.buddy.miniExit();}

window.buddy.onStateChange(({state,isMini:mini})=>{setMini(mini);applyState(state);});
if(window.buddy.onShowBubble)window.buddy.onShowBubble((t)=>{
  console.log('Got bubble signal:', t);
  showBubble(t);
});

const audioEl=new Audio();audioEl.preload='auto';
if(window.buddy.onPlaySound)window.buddy.onPlaySound(({path,volume})=>{audioEl.src='file://'+path;audioEl.volume=Math.max(0,Math.min(1,volume??0.6));audioEl.currentTime=0;audioEl.play().catch(()=>{});});

// Sound panel (triple-click)
let sOpen=false,sEl=null;
async function openSettings(){
  if(sOpen&&sEl){sEl.remove();sOpen=false;window.buddy.disableMouse();return;}
  window.buddy.enableMouse();
  sOpen=true;
  const cfg=await window.buddy.soundGetConfig();
  const packs=await window.buddy.soundListPacks();
  sEl=document.createElement('div');
  sEl.style.cssText='position:fixed;top:4px;left:50%;transform:translateX(-50%);background:#000;border:2px solid #fcfc00;padding:7px 9px;color:#fff;font-family:"Courier New",monospace;font-size:9px;z-index:200;min-width:140px;line-height:1.7;';
  sEl.innerHTML=`
  <style>
    .sp-wrap{color:#fff;font-family:'Courier New',monospace;font-size:9px;line-height:1.5;}
    .sp-title{color:#fcfc00;font-weight:bold;margin-bottom:4px;}
    .sp-row{margin-top:4px;}
    .sp-select,.sp-range,.sp-btn,.sp-close{width:100%;font-family:'Courier New',monospace;font-size:10px;}
    .sp-select{background:#111;color:#fcfc00;border:1px solid #fcfc00;padding:2px 3px;}
    .sp-range{width:100%;}
    .sp-check{margin-right:4px;}
    .sp-btn{background:#fcfc00;border:none;color:#000;padding:4px 6px;cursor:pointer;font-weight:bold;}
    .sp-close{background:#333;border:1px solid #666;color:#fff;padding:4px 6px;cursor:pointer;}
    .sp-actions{display:flex;gap:4px;margin-top:6px;}
    .sp-actions button{flex:1;}
  </style>
  <div class="sp-wrap">
    <div class="sp-title">🤖 SOUNDS</div>
    <select id="sp-p" class="sp-select"></select>
    <div class="sp-row">Vol: <span id="sp-v"></span></div>
    <input id="sp-r" class="sp-range" type="range" min="0" max="100">
    <label class="sp-row"><input id="sp-e" class="sp-check" type="checkbox"> on</label>
    <div class="sp-actions">
      <button id="sp-t" class="sp-btn">▶ test</button>
      <button id="sp-c" class="sp-close">✕</button>
    </div>
  </div>`;
  document.body.appendChild(sEl);
  sEl.querySelector('#sp-p').onchange=async(e)=>{showBubble('loading...');await window.buddy.soundLoadPack(e.target.value).catch(()=>{});showBubble('loaded!');};
  sEl.querySelector('#sp-r').oninput=(e)=>{sEl.querySelector('#sp-v').textContent=e.target.value+'%';window.buddy.soundSetVolume(e.target.value/100);};
  sEl.querySelector('#sp-e').onchange=(e)=>window.buddy.soundSetEnabled(e.target.checked);
  sEl.querySelector('#sp-t').onclick=()=>window.buddy.soundTest('task.complete');
  sEl.querySelector('#sp-c').onclick=()=>{sEl.remove();sOpen=false;window.buddy.disableMouse();};
}
// Deleted sound panel trigger from click
window.buddy.showSoundPanel(() => openSettings());

applyState('idle');
showBubble('OKcomputer online \uD83E\uDD16');
</script>
</body>
</html>
