<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bankr Buddy — PRETEXT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:340px;height:320px;background:transparent;overflow:visible;font-family:'Courier New',monospace}
#pet{position:absolute;left:70px;top:60px;width:200px;height:200px;cursor:grab;transform-origin:center center;pointer-events:auto;z-index:10}
#pet:active{cursor:grabbing}
canvas{display:block;width:200px;height:200px;overflow:visible}
@keyframes idle-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes think-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes work-shake{0%,100%{transform:translateX(0)}33%{transform:translateX(-2px)}66%{transform:translateX(2px)}}
@keyframes happy-bounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-12px) rotate(-3deg)}70%{transform:translateY(-6px) rotate(3deg)}}
@keyframes error-wobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}80%{transform:rotate(-3deg)}}
@keyframes sleep-sway{0%,100%{transform:rotate(-2deg) translateY(2px)}50%{transform:rotate(2deg)}}
@keyframes juggle-spin{0%{transform:rotate(0) scale(.82)}50%{transform:rotate(180deg) scale(.78)}100%{transform:rotate(360deg) scale(.82)}}
@keyframes conduct-wave{0%,100%{transform:translateX(0) scaleX(1)}33%{transform:translateX(-3px) scaleX(.97)}66%{transform:translateX(3px) scaleX(1.03)}}
@keyframes notif-jump{0%,100%{transform:translateY(0)}20%{transform:translateY(-13px)}40%{transform:translateY(0)}65%{transform:translateY(-7px)}}
@keyframes sweep-slide{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
@keyframes carry-waddle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg) translateY(-2px)}75%{transform:rotate(3deg) translateY(-2px)}}
@keyframes build-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes mini-breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.96)}}
@keyframes poke-react{0%{transform:scale(1) rotate(0)}30%{transform:scale(.85) rotate(-8deg)}70%{transform:scale(1.08) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.anim-idle{animation:idle-bob 2.5s ease-in-out infinite}.anim-thinking{animation:think-pulse 1s ease-in-out infinite}.anim-working{animation:work-shake .22s linear infinite}.anim-building{animation:build-shake .16s linear infinite}.anim-happy{animation:happy-bounce .6s ease-in-out 4}.anim-error{animation:error-wobble .38s ease-in-out infinite}.anim-sleeping{animation:sleep-sway 3.2s ease-in-out infinite}.anim-juggling{animation:juggle-spin 1.1s linear infinite}.anim-conducting{animation:conduct-wave .75s ease-in-out infinite}.anim-notification{animation:notif-jump .5s ease-in-out infinite}.anim-sweeping{animation:sweep-slide .9s ease-in-out infinite}.anim-carrying{animation:carry-waddle .7s ease-in-out infinite}.anim-mini{animation:mini-breathe 3s ease-in-out infinite}.anim-poke{animation:poke-react .35s ease-in-out}
</style>
</head>
<body>
<div id="pet" class="anim-idle">
<canvas id="c" width="400" height="400"></canvas>
</div>
<script>
var DPR=2,W=200,H=200;
var cv=document.getElementById('c');var ctx=cv.getContext('2d');
cv.width=W*DPR;cv.height=H*DPR;ctx.scale(DPR,DPR);
var MX='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789$BNKR';
var GL='◆◇○●◎★☆';
function rc(p){return p[(Math.random()*p.length)|0];}
var STATES={idle:{color:'#00ff41',rain:.3,chaos:0,pulse:0,face:'happy',msg:''},thinking:{color:'#f5d020',rain:.6,chaos:.15,pulse:.5,face:'think',msg:'thinking'},working:{color:'#ff6b35',rain:.9,chaos:.3,pulse:.8,face:'focus',msg:'on it'},building:{color:'#ff6b35',rain:1,chaos:.4,pulse:1,face:'focus',msg:'building'},happy:{color:'#34c759',rain:.2,chaos:0,pulse:.3,face:'happy',msg:'done'},error:{color:'#ff3b30',rain:1,chaos:.8,pulse:1,face:'error',msg:'uh oh'},sleeping:{color:'#336633',rain:.1,chaos:0,pulse:0,face:'sleep',msg:''},juggling:{color:'#7b5bf5',rain:1,chaos:.5,pulse:.7,face:'wide',msg:'routing'},conducting:{color:'#7b5bf5',rain:1,chaos:.4,pulse:.6,face:'wide',msg:'multi-agent'},notification:{color:'#ff9500',rain:.7,chaos:.2,pulse:.9,face:'wide',msg:'hey'},sweeping:{color:'#f5d020',rain:.5,chaos:.1,pulse:.4,face:'happy',msg:'compacting'},carrying:{color:'#ff6b35',rain:.6,chaos:.2,pulse:.5,face:'focus',msg:'carrying'}};
// FACE LOOKS LEFT — eyes are on left side of grid
var FACE={
happy:['.......44......','......4444.....','......444444...','....11111111...','...1111111111..','.111111111111..','..112211112211.','..112211112211.','.11111111111...','..11111111111..','..111133331111.','.11113333111..','..1111111111...','...11111111....','....111111.....','......55.......'],
think:['.......44......','......4444.....','......444444...','....11111111...','...1111111111..','.111111111111..','..112211112211.','..112211112211.','.11111111111...','..11111111111..','...11111331111.','.11111331111..','..1111111111...','...11111111....','....111111.....','......55.......'],
focus:['.......44......','......4444.....','......444444...','....11111111...','...1111111111..','.111111111111..','..112211112211.','..112211112211.','.11111111111...','..11111111111..','..11133333311..','.11111111111..','..1111111111...','...11111111....','....111111.....','......55.......'],
error:['.......44......','......4444.....','......444444...','....11111111...','...1111111111..','.111111111111..','..211211211211.','..112211112211.','..211211211211.','.11111111111...','..13311113311..','.11113333111..','..1111111111...','...11111111....','....111111.....','......55.......'],
wide:['.......44......','......4444.....','......444444...','....11111111...','...1111111111..','.111111111111..','..122211122211.','..122211122211.','..122211122211.','.11111111111...','..111133331111.','.11113333111..','..1111111111...','...11111111....','....111111.....','......55.......'],
sleep:['.......44......','......4444.....','......444444...','....11111111...','...1111111111..','.111111111111..','.11111111111..','..113311113311.','.11111111111...','.11111111111...','.11111111111...','.11111111111..','..1111111111...','...11111111....','....111111.....','......55.......']};
var GC=15,GR=16,CELL=W/(GC+2),OX=CELL*1.5,OY=CELL*.8;
var glyphs=[];
function buildGlyphs(fk){var map=FACE[fk]||FACE.happy;glyphs.length=0;for(var r=0;r<GR;r++){var row=map[r]||'';for(var c=0;c<GC;c++){var cell=row[c]||'.';if(cell==='.')continue;var hx=OX+c*CELL,hy=OY+r*CELL,t=parseInt(cell)||1;var ch;if(t===2)ch=rc(GL);else if(t===4)ch='║';else if(t===5)ch='◎';else if(t===3)ch='█';else ch=rc(MX);glyphs.push({ch:ch,t:t,hx:hx,hy:hy,x:hx+(Math.random()-.5)*W*2,y:-Math.random()*H*2,vx:0,vy:0,rot:(Math.random()-.5)*Math.PI*2,vr:0,ht:1,a:0,ct:Math.random()*200,c:c,r:r});}}}
function morphTo(fk){var map=FACE[fk]||FACE.happy;var nt=[];for(var r=0;r<GR;r++){var row=map[r]||'';for(var c=0;c<GC;c++){var cell=row[c]||'.';if(cell==='.')continue;nt.push({hx:OX+c*CELL,hy:OY+r*CELL,t:parseInt(cell)||1,c:c,r:r});}}var ml=Math.max(glyphs.length,nt.length);for(var i=0;i<ml;i++){if(i<nt.length&&i<glyphs.length){glyphs[i].hx=nt[i].hx;glyphs[i].hy=nt[i].hy;glyphs[i].t=nt[i].t;glyphs[i].c=nt[i].c;glyphs[i].r=nt[i].r;glyphs[i].ht=.5;}else if(i>=glyphs.length&&i<nt.length){var n=nt[i];var ch;if(n.t===2)ch=rc(GL);else if(n.t===4)ch='║';else if(n.t===5)ch='◎';else if(n.t===3)ch='█';else ch=rc(MX);glyphs.push({ch:ch,t:n.t,hx:n.hx,hy:n.hy,x:n.hx+(Math.random()-.5)*W,y:-Math.random()*H,vx:(Math.random()-.5)*3,vy:Math.random()*-4,rot:(Math.random()-.5)*2,vr:0,ht:1,a:0,ct:Math.random()*200,c:n.c,r:n.r});}}if(glyphs.length>nt.length)glyphs.length=nt.length;}
var rain=[];for(var i=0;i<16;i++){var d={x:(i/16)*W+Math.random()*(W/16),y:Math.random()*H,sp:.5+Math.random()*2,ch:[],ln:4+((Math.random()*7)|0),t:0};for(var j=0;j<d.ln;j++)d.ch.push(rc(MX));rain.push(d);}
// Speech — stays INSIDE the 200x200 canvas, arcs in upper portion
var spG=[],spQ=[],spT=0;var MCX=OX+6*CELL,MCY=OY+10*CELL;
function speak(text){if(!text)return;spQ=[];spT=0;spG.length=0;var chars=text.toUpperCase().split('');for(var i=0;i<chars.length;i++){var ang=-Math.PI*.7+i/((chars.length-1)||1)*Math.PI*.4;var rad=30+chars.length*2;spQ.push({ch:chars[i],delay:i*3,born:false,tx:W*.5+Math.cos(ang)*rad,ty:Math.max(8,25+Math.sin(ang)*rad)});}}
function tickSpeech(){spT++;for(var qi=0;qi<spQ.length;qi++){var q=spQ[qi];if(!q.born&&spT>=q.delay){q.born=true;spG.push({ch:rc(MX),tgt:q.ch,x:MCX+(Math.random()-.5)*10,y:MCY+(Math.random()-.5)*5,tx:q.tx,ty:q.ty,vx:0,vy:0,age:0,max:170,morph:16,hold:45,scat:120,sz:4});}}for(var i=spG.length-1;i>=0;i--){var s=spG[i];s.age++;if(s.age<s.morph){s.x+=(s.tx-s.x)*.07;s.y+=(s.ty-s.y)*.07;if(s.age%2===0)s.ch=rc(MX);s.sz=4+s.age/s.morph*4;}else if(s.age===s.morph)s.ch=s.tgt;else if(s.age<s.hold){s.x+=(s.tx-s.x)*.14;s.y+=(s.ty-s.y)*.14;s.sz=8;}else if(s.age<s.scat){s.x+=(s.tx-s.x)*.03;s.x+=Math.sin(gt*.025+i)*.12;s.sz=8;}else{if(s.age===s.scat){s.vx=(Math.random()-.5)*2;s.vy=-Math.random()*1-.3;}s.x+=s.vx;s.y+=s.vy;s.vy+=.008;if(s.age%3===0)s.ch=rc(MX);s.sz=Math.max(2,8-(s.age-s.scat)*.05);}if(s.age>s.max)spG.splice(i,1);}}
var cur='idle',cf=STATES.idle,isMini=false,gt=0,lC=0,lR=.3,lP=0;
var clickCount=0,clickTimer=null,dragging=false,dragOffX=0,dragOffY=0,isDragMoved=false,startSX=0,startSY=0;
var pet=document.getElementById('pet');buildGlyphs('happy');
function blastAll(f){var cx=W/2,cy=H/2;for(var i=0;i<glyphs.length;i++){var g=glyphs[i];var dx=g.x-cx,dy=g.y-cy,d=Math.max(1,Math.sqrt(dx*dx+dy*dy));g.vx+=(dx/d)*f*(.5+Math.random());g.vy+=(dy/d)*f*(.5+Math.random());g.vr+=(Math.random()-.5)*f*.3;g.ht=1;}}
function applyState(state){var cfg=STATES[state]||STATES.idle;var prev=cur;cur=state;cf=cfg;pet.className='anim-'+(isMini?'mini':state);var pf=(STATES[prev]||STATES.idle).face;if(cfg.face!==pf)morphTo(cfg.face);speak(cfg.msg);if(state==='error'||state==='juggling'||state==='notification')blastAll(cfg.chaos*8);}
function tick(){gt++;lC+=(cf.chaos-lC)*.04;lR+=(cf.rain-lR)*.04;lP+=(cf.pulse-lP)*.05;for(var i=0;i<glyphs.length;i++){var g=glyphs[i];g.vx+=(g.hx-g.x)*.045;g.vy+=(g.hy-g.y)*.045;if(lC>0){g.vx+=(Math.random()-.5)*lC*2;g.vy+=(Math.random()-.5)*lC*2;g.vr+=(Math.random()-.5)*lC*.15;}g.vx*=.88;g.vy*=.88;g.vr*=.92;g.x+=g.vx;g.y+=g.vy;g.rot+=g.vr;g.rot+=(0-g.rot)*.06;g.ht*=.96;g.a+=(1-g.a)*.05;g.ct--;if(g.ct<=0&&g.t===1){g.ch=rc(MX);g.ct=(g.ht>.3?3:30)+Math.random()*20;}if(cur==='sleeping')g.x+=Math.sin(gt*.01+g.c*.5)*.08;}for(var i=0;i<rain.length;i++){var d=rain[i];d.y+=d.sp*lR*1.5;d.t++;if(d.t%4===0)d.ch[0]=rc(MX);if(d.y>H+d.ln*8){d.y=-d.ln*8;d.x=Math.random()*W;d.sp=.5+Math.random()*2;}}tickSpeech();render();requestAnimationFrame(tick);}
function render(){ctx.clearRect(0,0,W,H);var sc=cf.color;
  if(lR>.05){ctx.font='7px "Courier New"';ctx.textBaseline='top';for(var i=0;i<rain.length;i++){var d=rain[i];for(var j=0;j<d.ch.length;j++){var cy=d.y-j*8;if(cy<-8||cy>H)continue;ctx.globalAlpha=(j===0?1:Math.max(.05,1-j/d.ln))*lR*.25;ctx.fillStyle=j===0?'#fff':sc;ctx.fillText(d.ch[j],d.x,cy);}}}
  ctx.textBaseline='middle';ctx.textAlign='center';for(var i=0;i<glyphs.length;i++){var g=glyphs[i];if(g.a<.01)continue;ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);var color=sc,fs=CELL*.85;if(g.t===2){color='#fff';fs=CELL*1.1;}else if(g.t===3){color=cur==='error'?'#ff3b30':'#fff';fs=CELL*.7;}else if(g.t===4){color=lP>.3?'hsl('+(gt*3%360)+',100%,60%)':sc;}else if(g.t===5){color=sc;fs=CELL*1.2;}ctx.globalAlpha=Math.min(1,g.a+g.ht*.6);if(lP>0)ctx.globalAlpha=Math.min(1,ctx.globalAlpha+Math.sin(gt*.08+g.c+g.r)*lP*.2);ctx.font='bold '+fs+'px "Courier New"';ctx.fillStyle=color;ctx.fillText(g.ch,0,0);ctx.restore();}
  if(cur==='sleeping'){ctx.globalAlpha=.5+Math.sin(gt*.04)*.3;ctx.fillStyle='#336633';ctx.textBaseline='middle';ctx.textAlign='center';var zo=Math.sin(gt*.025)*3;ctx.font='bold 10px "Courier New"';ctx.fillText('Z',W*.25,H*.18+zo);ctx.font='bold 14px "Courier New"';ctx.fillText('Z',W*.18,H*.11+zo*.7);ctx.font='bold 18px "Courier New"';ctx.fillText('Z',W*.12,H*.04+zo*.4);}
  ctx.textBaseline='middle';ctx.textAlign='center';for(var i=0;i<spG.length;i++){var s=spG[i];var lr=s.age/s.max;var alpha=lr<.08?lr/.08:lr>.78?1-(lr-.78)/.22:1;ctx.globalAlpha=alpha*.85;ctx.fillStyle=s.age<s.morph?sc:s.age<s.scat?'#fff':sc;ctx.font='bold '+s.sz+'px "Courier New"';ctx.fillText(s.ch,s.x,s.y);}
  ctx.globalAlpha=.03;ctx.fillStyle='#000';for(var sy=0;sy<H;sy+=3)ctx.fillRect(0,sy,W,1);ctx.globalAlpha=1;}
if(window.buddy&&window.buddy.onGlobalMouse){window.buddy.onGlobalMouse(function(pos){if(cur==='working'||cur==='building'||cur==='error')return;var cx=window.screenX+170,cy=window.screenY+160;var ox=Math.max(-4,Math.min(4,(pos.x-cx)/100)),oy=Math.max(-3,Math.min(3,(pos.y-cy)/100));for(var i=0;i<glyphs.length;i++){if(glyphs[i].t===2){glyphs[i].hx=(OX+glyphs[i].c*CELL)+ox;glyphs[i].hy=(OY+glyphs[i].r*CELL)+oy;}}});}
function registerPetTap(){clickCount++;clearTimeout(clickTimer);clickTimer=setTimeout(function(){if(clickCount>=3){if(window.buddy)window.buddy.forceState('juggling');speak('AHHH');blastAll(12);setTimeout(function(){if(window.buddy)window.buddy.forceState('idle');},3000);}else if(clickCount>=1){if(cur==='happy'||cur==='sleeping'){if(window.buddy)window.buddy.forceState('idle');}else{pet.classList.add('anim-poke');blastAll(3);setTimeout(function(){pet.classList.remove('anim-poke');pet.classList.add('anim-'+(isMini?'mini':cur));},400);speak('BNKR buddy');if(window.buddy)window.buddy.soundTest('session.start');}}clickCount=0;},400);}
pet.addEventListener('mousedown',function(e){if(e.button!==0)return;dragging=true;isDragMoved=false;startSX=e.screenX;startSY=e.screenY;dragOffX=e.screenX-window.screenX;dragOffY=e.screenY-window.screenY;if(window.buddy)window.buddy.enableMouse();});
document.addEventListener('mousemove',function(e){if(!dragging)return;if(Math.abs(e.screenX-startSX)>6||Math.abs(e.screenY-startSY)>6)isDragMoved=true;if(isDragMoved)window.moveTo(e.screenX-dragOffX,e.screenY-dragOffY);});
document.addEventListener('mouseup',function(e){if(!dragging||e.button!==0)return;var wd=isDragMoved;dragging=false;if(window.buddy)window.buddy.dragEnd({x:window.screenX,y:window.screenY});if(!pet.contains(e.target)&&window.buddy)window.buddy.disableMouse();if(!wd)registerPetTap();});
pet.addEventListener('mouseenter',function(){if(!dragging&&window.buddy)window.buddy.enableMouse();});
pet.addEventListener('mouseleave',function(){if(!dragging&&window.buddy)window.buddy.disableMouse();});
function setMini(f){isMini=f;if(f)pet.className='anim-mini';else{pet.className='anim-'+cur;if(window.buddy)window.buddy.miniExit();}}
if(window.buddy){window.buddy.onStateChange(function(data){setMini(data.isMini);applyState(data.state);});if(window.buddy.onShowBubble)window.buddy.onShowBubble(function(text){speak(text);});if(window.buddy.onPlaySound)window.buddy.onPlaySound(function(data){if(!data||!data.path)return;var a=new Audio('file://'+data.path);a.volume=data.volume||1;a.play().catch(function(){});});}
applyState('idle');speak('pretext online');tick();
</script>
</body>
</html>
